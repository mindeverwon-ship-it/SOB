<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · Карта закладів освіти</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
.map-layout { display: grid; grid-template-columns: 372px 1fr; height: calc(100vh - var(--topbar-h)); }
.map-side { border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; min-height: 0; }
.map-side-head { padding: 22px 20px 14px; border-bottom: 1px solid var(--border); }
.map-search { display: flex; align-items: center; gap: 9px; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 12px; padding: 11px 14px; margin-top: 14px; }
.map-search svg { width: 17px; height: 17px; color: var(--muted); }
.map-search input { border: none; background: none; outline: none; font-size: 14px; width: 100%; }
.seg { display: flex; gap: 4px; background: var(--surface-3); border-radius: 12px; padding: 4px; margin-top: 12px; }
.seg button { flex: 1; padding: 8px 6px; font-size: 13px; font-weight: 600; border-radius: 9px; color: var(--muted); transition: all .15s; }
.seg button.on { background: var(--surface); color: var(--blue-700); box-shadow: var(--shadow-xs); }
.map-stat-row { display: flex; gap: 9px; margin-top: 14px; }
.map-stat { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; text-align: center; }
.map-stat .v { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
.map-stat .l { font-size: 11px; color: var(--muted); }
.school-list { flex: 1; overflow-y: auto; padding: 10px; }
.sl-group { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); font-weight: 700; padding: 14px 12px 6px; }
.sl-item { display: flex; gap: 12px; padding: 12px; border-radius: 14px; cursor: pointer; transition: background .14s; border: 1px solid transparent; }
.sl-item:hover { background: var(--surface-2); }
.sl-item.active { background: var(--blue-050); border-color: var(--blue-100); }
.sl-thumb { width: 50px; height: 50px; border-radius: 13px; display: grid; place-items: center; color: #fff; flex-shrink: 0; }
.sl-thumb.serv { background: linear-gradient(135deg,var(--blue-500),var(--navy-700)); }
.sl-thumb.other { background: var(--surface-3); color: var(--muted); }
.sl-thumb svg { width: 23px; height: 23px; }
.sl-body { min-width: 0; flex: 1; }
.sl-name { font-weight: 600; font-size: 14px; line-height: 1.3; }
.sl-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sl-stats { display: flex; gap: 12px; margin-top: 7px; font-size: 12px; }
.sl-stats span { color: var(--text-2); font-weight: 600; }
.sl-stats span i { color: var(--muted); font-weight: 400; font-style: normal; }
.map-canvas { position: relative; min-height: 0; }
#map { width: 100%; height: 100%; background: #dde6f1; }
.map-legend { position: absolute; left: 16px; bottom: 16px; z-index: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 12px 15px; display: flex; flex-direction: column; gap: 9px; }
.map-legend .li { display: flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 500; }
.map-legend .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.leaflet-popup-content-wrapper { border-radius: 18px; box-shadow: var(--shadow-lg); padding: 0; overflow: hidden; }
.leaflet-popup-content { margin: 0; width: 280px !important; font-family: 'Onest', sans-serif; }
.pop-photo { height: 116px; display: grid; place-items: center; color: rgba(255,255,255,.55); position: relative; }
.pop-photo.serv { background: linear-gradient(135deg,var(--navy-700),var(--navy-950)); }
.pop-photo.other { background: linear-gradient(135deg,#8795ad,#5d6b85); }
.pop-photo svg { width: 34px; height: 34px; }
.pop-photo .pop-tag { position: absolute; top: 11px; left: 11px; }
.pop-body { padding: 15px 16px; }
.pop-name { font-weight: 700; font-size: 15px; line-height: 1.25; }
.pop-addr { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 5px; align-items: flex-start; }
.pop-addr svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }
.pop-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin: 13px 0; }
.pop-grid .pg { background: var(--surface-2); border-radius: 10px; padding: 9px 6px; text-align: center; }
.pop-grid .pg .v { font-weight: 800; font-size: 16px; }
.pop-grid .pg .l { font-size: 10px; color: var(--muted); }
.pop-insp { display: flex; align-items: center; gap: 9px; padding: 9px; background: var(--blue-050); border-radius: 11px; margin-bottom: 11px; }
.pop-insp .av { width: 34px; height: 34px; border-radius: 10px; }
.pop-insp .n { font-size: 12.5px; font-weight: 600; }
.pop-insp .r { font-size: 11px; color: var(--muted); }
.pop-note { font-size: 12.5px; color: var(--muted); background: var(--surface-2); border-radius: 10px; padding: 10px 12px; margin-bottom: 11px; }
.marker-pin { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 3px solid #fff; box-shadow: 0 3px 8px rgba(10,23,51,.4); display: grid; place-items: center; }
.marker-pin.serv { background: var(--blue-600); }
.marker-pin.top { background: var(--gold-500); }
.marker-pin.other { background: #8795ad; width: 22px; height: 22px; }
.marker-pin span { transform: rotate(45deg); color: #fff; font-weight: 800; font-size: 12px; }
.marker-pin.top span { color: var(--navy-900); }
@media (max-width: 880px){ .map-layout { grid-template-columns: 1fr; height: auto; } .map-side { height: auto; max-height: 50vh; } .map-canvas { height: 60vh; } }
</style>
</head>
<body>
<div class="app" id="shell"></div>

<script src="js/data.js?v=5"></script>
<script src="js/store.js?v=11"></script>
<script src="js/shell.js?v=5"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
SOBShell.render({ active: 'map', crumb: ['СОБ', 'Карта закладів освіти'] });
document.getElementById('content').style.cssText = 'padding:0;max-width:none';

const S = window.SOB, F = window.fmt, I = window.ICON;
const serviced = S.schools.filter(s => s.serviced);
const totalEvents = serviced.reduce((a,s)=>a+(s.events||0),0);
const totalPart = serviced.reduce((a,s)=>a+(s.participants||0),0);
const ranked = [...serviced].sort((a,b)=>(b.rating||0)-(a.rating||0));
const topId = ranked.length ? ranked[0].id : null;

let filter = 'all'; // all | serviced

document.getElementById('content').innerHTML = `
  <div class="map-layout">
    <div class="map-side">
      <div class="map-side-head">
        <div class="section-title">${I.map} Заклади освіти області</div>
        <div class="seg" id="seg">
          <button data-f="all" class="on">Усі заклади</button>
          <button data-f="serviced">Наші заклади (СОБ)</button>
        </div>
        <label class="map-search">${I.search}<input type="text" id="schSearch" placeholder="Пошук за назвою, містом, адресою…"></label>
        <div class="map-stat-row">
          <div class="map-stat"><div class="v">${S.schools.length}</div><div class="l">усього</div></div>
          <div class="map-stat"><div class="v" style="color:var(--blue-600)">${serviced.length}</div><div class="l">наші</div></div>
          <div class="map-stat"><div class="v">${totalEvents}</div><div class="l">заходів</div></div>
        </div>
      </div>
      <div class="school-list" id="schList"></div>
    </div>
    <div class="map-canvas">
      <div id="map"></div>
      <div class="map-legend">
        <div class="li"><span class="pin-dot" style="background:var(--gold-500)"></span>Лідер рейтингу</div>
        <div class="li"><span class="pin-dot" style="background:var(--blue-600)"></span>Наш заклад (СОБ)</div>
        <div class="li"><span class="pin-dot" style="background:#8795ad"></span>Інший заклад області</div>
      </div>
    </div>
  </div>`;

/* Leaflet */
const map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([S.org.center.lat, S.org.center.lng], S.org.zoom || 9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap, &copy; CARTO', maxZoom: 19, subdomains: 'abcd' }).addTo(map);

const markers = {};
function popupHtml(s){
  const isTop = s.id === topId;
  if(s.serviced){
    const ins = S.inspectors[s.inspector] || {};
    const init = (ins.name||'СОБ').split(' ').map(w=>w[0]).slice(0,2).join('');
    return `<div class="pop-photo serv">${I.image}${isTop ? '<span class="pop-tag tag gold">★ Лідер рейтингу</span>' : '<span class="pop-tag tag blue" style="background:rgba(255,255,255,.9)">Наш заклад</span>'}</div>
      <div class="pop-body">
        <div class="pop-name">${s.name}</div>
        <div class="pop-addr">${I.pin}${s.address}</div>
        <div class="pop-grid">
          <div class="pg"><div class="v">${s.events||0}</div><div class="l">заходів</div></div>
          <div class="pg"><div class="v">${s.prevention||0}</div><div class="l">профіл.</div></div>
          <div class="pg"><div class="v">${F(s.participants||0)}</div><div class="l">учасн.</div></div>
        </div>
        <div class="pop-insp"><div class="avatar-init av">${init}</div><div><div class="n">${ins.name||''}</div><div class="r">${ins.rank||'Працівник СОБ'}</div></div></div>
        <a class="btn btn-primary btn-sm btn-block" href="school.html?id=${s.id}">Картка закладу ${I.chevron}</a>
      </div>`;
  }
  return `<div class="pop-photo other">${I.image}<span class="pop-tag tag gray" style="background:rgba(255,255,255,.9)">Не закріплено</span></div>
    <div class="pop-body">
      <div class="pop-name">${s.name}</div>
      <div class="pop-addr">${I.pin}${s.address}</div>
      <div class="pop-note">Заклад не закріплено за СОБ. Можна додати до обслуговування у кабінеті працівника СОБ або адмін-панелі.</div>
      <div class="tag gray">${s.type} · ${s.city||''}</div>
    </div>`;
}

S.schools.forEach(s => {
  const isTop = s.id === topId;
  const cls = !s.serviced ? 'other' : (isTop ? 'top' : 'serv');
  const inner = s.serviced ? `<span>${s.events||0}</span>` : '';
  const icon = L.divIcon({ className: '', html: `<div class="marker-pin ${cls}">${inner}</div>`, iconSize: s.serviced?[32,32]:[22,22], iconAnchor: s.serviced?[16,32]:[11,22], popupAnchor: [0,-28] });
  const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
  m.bindPopup(popupHtml(s), { maxWidth: 300 });
  m.on('click', () => highlight(s.id));
  markers[s.id] = m;
});

function renderList(){
  const q = (document.getElementById('schSearch').value||'').trim().toLowerCase();
  let list = S.schools.filter(s => filter==='all' || s.serviced);
  if(q) list = list.filter(s => (s.name+' '+s.address+' '+(s.city||'')+' '+s.type).toLowerCase().includes(q));
  const serv = list.filter(s=>s.serviced).sort((a,b)=>(b.rating||0)-(a.rating||0));
  const other = list.filter(s=>!s.serviced);
  const item = s => `<div class="sl-item" data-id="${s.id}">
    <div class="sl-thumb ${s.serviced?'serv':'other'}">${s.serviced?I.shield:I.school}</div>
    <div class="sl-body">
      <div class="sl-name">${s.name}</div>
      <div class="sl-meta">${s.type} · ${s.city||s.address.split(',').slice(-1)[0].trim()}</div>
      ${s.serviced?`<div class="sl-stats"><span>${s.events||0} <i>заходів</i></span><span>${F(s.participants||0)} <i>учасн.</i></span></div>`:''}
    </div></div>`;
  let html = '';
  if(serv.length) html += `<div class="sl-group">Наші заклади · ${serv.length}</div>` + serv.map(item).join('');
  if(other.length && filter==='all') html += `<div class="sl-group">Інші заклади області · ${other.length}</div>` + other.map(item).join('');
  if(!serv.length && !other.length) html = `<div style="padding:30px;text-align:center;color:var(--muted)">Нічого не знайдено</div>`;
  document.getElementById('schList').innerHTML = html;
}

function highlight(id){ document.querySelectorAll('.sl-item').forEach(el => el.classList.toggle('active', el.dataset.id === id)); }

document.getElementById('schList').addEventListener('click', e => {
  const item = e.target.closest('.sl-item'); if(!item) return;
  const id = item.dataset.id; const s = S.schools.find(x=>x.id===id);
  map.flyTo([s.lat, s.lng], 13, { duration: .7 });
  markers[id].openPopup(); highlight(id);
});
document.getElementById('seg').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  filter = b.dataset.f;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on', x===b));
  // hide/show non-serviced markers
  S.schools.forEach(s => { if(!s.serviced){ if(filter==='serviced') map.removeLayer(markers[s.id]); else markers[s.id].addTo(map); } });
  renderList();
});
document.getElementById('schSearch').addEventListener('input', renderList);

renderList();
setTimeout(()=>map.invalidateSize(), 200);
</script>
</body>
</html>

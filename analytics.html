<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · Аналітика</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.an-kpis { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:22px; }
.an-kpi  { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; }
.an-kpi .l { font-size:12.5px; color:var(--muted); }
.an-kpi .v { font-size:28px; font-weight:800; letter-spacing:-.025em; margin-top:5px; }
.an-kpi .s { font-size:11.5px; color:var(--muted); margin-top:5px; }

/* Coverage metrics */
.cov-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.cov-kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; display:flex; flex-direction:column; gap:4px; }
.cov-kpi .ck-icon { width:34px; height:34px; border-radius:10px; display:grid; place-items:center; margin-bottom:4px; }
.cov-kpi .ck-icon svg { width:16px; height:16px; }
.cov-kpi .ck-v { font-size:26px; font-weight:800; letter-spacing:-.02em; }
.cov-kpi .ck-l { font-size:12px; color:var(--muted); }

/* Category grid */
.cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-top:14px; }
.cat-cell { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:13px 15px; }
.cat-cell .cc-top { display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.cat-cell .cc-dot { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
.cat-cell .cc-lbl { font-size:12px; font-weight:600; color:var(--text-2); line-height:1.3; }
.cat-cell .cc-num { font-size:24px; font-weight:800; letter-spacing:-.02em; }
.cat-cell .cc-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.cat-cell.zero { opacity:.45; }

/* Split table */
.split-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.split-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; }
.split-block .sb-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.split-block .sb-badge { padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; }
.sb-badge.zrup { background:var(--blue-050); color:var(--blue-700); }
.sb-badge.gunp { background:var(--navy-050,#f0f4ff); color:var(--navy-800); }
.split-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
.split-row:last-child { border-bottom:none; }
.split-row .sr-k { color:var(--muted); }
.split-row .sr-v { font-weight:700; }

/* Coverage bar table */
.cov-bar-wrap { height:7px; background:var(--surface-3); border-radius:4px; overflow:hidden; margin-top:4px; }
.cov-bar { height:100%; border-radius:4px; transition:width .4s; }

.chart-box  { position:relative; height:280px; }
.dough-box  { position:relative; height:200px; width:200px; flex-shrink:0; }
.legend     { display:flex; flex-direction:column; gap:9px; flex:1; overflow-y:auto; max-height:200px; }
.legend-item{ display:flex; align-items:center; gap:9px; font-size:12.5px; }
.legend-item .sw { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
.legend-item b { margin-left:auto; font-variant-numeric:tabular-nums; }
.tbl .rk { width:32px; height:32px; border-radius:9px; display:grid; place-items:center; font-weight:800; font-size:13px; background:var(--surface-3); color:var(--text-2); }
.tbl .rk.g1 { background:var(--gold-100); color:var(--gold-700); }
.tbl .rk.g2 { background:#E7ECF4; color:var(--navy-700); }
.tbl .rk.g3 { background:var(--amber-100); color:var(--amber-500); }

@media(max-width:1080px){ .an-kpis{grid-template-columns:repeat(3,1fr)} .cov-kpis{grid-template-columns:repeat(2,1fr)} .split-grid{grid-template-columns:1fr} }
@media(max-width:700px){ .an-kpis{grid-template-columns:repeat(2,1fr)} }
@media(max-width:480px){ .an-kpis{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="app" id="shell"></div>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
<script>
SOBShell.render({ active:'analytics', crumb:['СОБ','Аналітика'] });

const S = window.SOB, F = window.fmt, I = window.ICON;
Chart.defaults.font.family = 'Onest, sans-serif';
Chart.defaults.font.size   = 12.5;
Chart.defaults.color       = '#6A7A98';
Chart.defaults.animation   = false;

let charts = {};
let filterSchool = 'all';

function destroyCharts(){
  Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  charts = {};
}

function calcData(){
  const serviced = (S.schools||[]).filter(s=>s.serviced);

  /* Загальна статистика (паспортні дані) */
  const totEvents       = serviced.reduce((a,s)=>a+(s.events||0),0);
  const totParticipations = serviced.reduce((a,s)=>a+(s.participants||0),0);
  const totConsult      = serviced.reduce((a,s)=>a+(s.consultations||0),0);
  const totStudents     = serviced.reduce((a,s)=>a+(s.students||0),0);
  const totPrevention   = serviced.reduce((a,s)=>a+(s.prevention||0),0);

  /* Унікально охоплені — мінімум участей і кількості учнів по кожному закладу */
  let totUnique = 0;
  serviced.forEach(s=>{
    const cov = window.calcCoverage ? window.calcCoverage(s) : { uniqueStudents: s.participants||0 };
    totUnique += cov.uniqueStudents;
  });
  const covPct = totStudents>0 ? Math.round(totUnique/totStudents*100) : 0;

  /* Середній рейтинг */
  const avgRating = serviced.length ? Math.round(serviced.reduce((a,s)=>a+(s.rating||0),0)/serviced.length) : 0;

  /* Розбивка по 22 категоріях з monthlyData */
  const catStats = window.calcCategoryStats ? window.calcCategoryStats() : {};

  /* ГУНП / ЗРУП поділ */
  const workers = S.workers || {};
  function workerSchools(cat){ return serviced.filter(s=>{const w=workers[s.inspector||'']; return w&&w.category===cat;}); }
  function groupStats(schools){
    return {
      schools: schools.length,
      events: schools.reduce((a,s)=>a+(s.events||0),0),
      participations: schools.reduce((a,s)=>a+(s.participants||0),0),
      unique: schools.reduce((a,s)=>a+(window.calcCoverage?window.calcCoverage(s).uniqueStudents:s.participants||0),0),
      students: schools.reduce((a,s)=>a+(s.students||0),0),
      workers: [...new Set(schools.map(s=>s.inspector).filter(Boolean))].length,
    };
  }
  const zrupSchools = workerSchools('ЗРУП');
  const gunpSchools = workerSchools('ГУНП');
  const zrupStats = groupStats(zrupSchools);
  const gunpStats = groupStats(gunpSchools);

  /* Топ закладів */
  const ranked = [...serviced].sort((a,b)=>(b.events||0)-(a.events||0));

  /* Динаміка по місяцях: Excel-база + платформні заходи з журналу */
  const mc = window.calcMonthlyChart ? window.calcMonthlyChart() : (S.charts?.eventsByMonth || {});
  const mLabels   = mc.labels       || [];
  const mEvents   = mc.events       || [];
  const mParts    = mc.participants || []; /* охоплені учні */

  return { serviced, totEvents, totParticipations, totConsult, totStudents, totPrevention, totUnique, covPct, avgRating,
           catStats, ranked, mLabels, mEvents, mParts, zrupStats, gunpStats };
}

function render(){
  const d = calcData();
  destroyCharts();

  const filtered = d.serviced.filter(s => filterSchool==='all' || s.id===filterSchool);

  /* ── KPI ── */
  const kpiHtml = `
    <div class="an-kpi anim anim-1">
      <div class="l">Проведено заходів</div>
      <div class="v tnum">${F(d.totEvents)}</div>
      <div class="s">профілактичних: ${d.totPrevention}</div>
    </div>
    <div class="an-kpi anim anim-2">
      <div class="l">Охоплено учнів (офіційний показник)</div>
      <div class="v tnum" style="color:var(--green-600)">${F(d.totParticipations)}</div>
      <div class="s">сума по колонці «охоплені учні» (∑ AE)</div>
    </div>
    <div class="an-kpi anim anim-3">
      <div class="l">Унікально охоплено (розрах.)</div>
      <div class="v tnum">${F(d.totUnique)}</div>
      <div class="s">з ${F(d.totStudents)} учнів у ЗЗСО · ${d.covPct}%</div>
    </div>
    <div class="an-kpi anim anim-4">
      <div class="l">Відсоток охоплення</div>
      <div class="v tnum" style="color:${d.covPct>=70?'var(--green-600)':d.covPct>=40?'var(--gold-600)':'var(--red-500)'}">${d.covPct}%</div>
      <div class="s">від загальної кількості учнів у ЗЗСО</div>
    </div>
    <div class="an-kpi anim anim-5">
      <div class="l">Консультацій</div>
      <div class="v tnum">${d.totConsult}</div>
      <div class="s">по обслуговуваних закладах</div>
    </div>`;

  /* ── 22 категорії заходів ── */
  const allCatTotal = Object.values(d.catStats).reduce((a,v)=>a+v,0);
  const catHtml = (S.eventCategories||[]).map(cat=>{
    const cnt = d.catStats[cat.id] || 0;
    const pct = allCatTotal>0 ? Math.round(cnt/allCatTotal*100) : 0;
    return `<div class="cat-cell ${cnt===0?'zero':''}">
      <div class="cc-top"><span class="cc-dot" style="background:${cat.color}"></span><span class="cc-lbl">${cat.short}</span></div>
      <div class="cc-num">${cnt}</div>
      <div class="cc-sub">${pct}% від загального</div>
    </div>`;
  }).join('');

  /* ── ГУНП/ЗРУП порівняння ── */
  function splitBlock(label, cls, st){
    const cp = st.students>0?Math.round(st.unique/st.students*100):0;
    return `<div class="split-block">
      <div class="sb-head">
        ${I.users}
        <span class="sb-badge ${cls}">${label}</span>
        <span style="font-size:13px;color:var(--muted);margin-left:auto">${st.workers} працівників</span>
      </div>
      <div class="split-row"><span class="sr-k">Закладів освіти</span><span class="sr-v">${st.schools}</span></div>
      <div class="split-row"><span class="sr-k">Проведено заходів</span><span class="sr-v">${F(st.events)}</span></div>
      <div class="split-row"><span class="sr-k">Участей у заходах</span><span class="sr-v">${F(st.participations)}</span></div>
      <div class="split-row"><span class="sr-k">Унікально охоплено</span><span class="sr-v">${F(st.unique)}</span></div>
      <div class="split-row">
        <span class="sr-k">Охоплення</span>
        <span class="sr-v" style="color:${cp>=70?'var(--green-600)':cp>=40?'var(--gold-600)':'var(--red-500)'}">${cp}%</span>
      </div>
      <div class="cov-bar-wrap" style="margin-top:8px"><div class="cov-bar" style="width:${cp}%;background:${cp>=70?'var(--green-500)':cp>=40?'var(--gold-500)':'var(--red-400)'}"></div></div>
    </div>`;
  }

  /* ── Таблиця закладів ── */
  const tblRows = [...filtered].sort((a,b)=>(b.events||0)-(a.events||0)).map((s,i)=>{
    const cov = window.calcCoverage ? window.calcCoverage(s) : { uniqueStudents:s.participants||0, coveragePercent:0 };
    const wp = cov.coveragePercent;
    const worker = S.workers && s.inspector ? S.workers[s.inspector] : null;
    return `<tr style="cursor:pointer" onclick="location.href='school.html?id=${s.id}'">
      <td><div class="rk ${i<3?'g'+(i+1):''}">${i+1}</div></td>
      <td><b>${s.name}</b><div style="font-size:11.5px;color:var(--muted)">${s.city||''} · ${worker?worker.name:''}</div></td>
      <td class="tnum">${s.events||0}</td>
      <td class="tnum">${F(s.participants||0)}</td>
      <td class="tnum">${cov.uniqueStudents}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cov-bar-wrap" style="width:60px"><div class="cov-bar" style="width:${wp}%;background:${wp>=70?'var(--green-500)':wp>=40?'var(--gold-500)':'var(--red-400)'}"></div></div>
          <span style="font-size:12.5px;font-weight:700;color:${wp>=70?'var(--green-600)':wp>=40?'var(--gold-600)':'var(--red-500)'}">${wp}%</span>
        </div>
      </td>
      <td class="tnum">${s.consultations||0}</td>
    </tr>`;
  }).join('');

  /* ── Топ категорій для пончика ── */
  const topCats = (S.eventCategories||[]).map(c=>({ label:c.short, color:c.color, count:d.catStats[c.id]||0 }))
    .filter(c=>c.count>0).sort((a,b)=>b.count-a.count).slice(0,8);
  const legendHtml = topCats.map(t=>`<div class="legend-item"><span class="sw" style="background:${t.color}"></span>${t.label}<b>${t.count}</b></div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Аналітика діяльності</h1>
        <div class="page-sub">Зведені показники роботи СОБ · ${S.org.period}</div>
      </div>
      <div class="row gap-8">
        <button class="btn btn-ghost" onclick="window.print()">${I.doc} Друк</button>
        <button class="btn btn-primary" onclick="exportAnalytics()">${I.download} CSV</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center">
      <span style="font-size:13px;color:var(--muted);font-weight:600">${I.filter} Фільтр за закладом:</span>
      <select class="input" id="filterSchoolEl" style="max-width:300px">
        <option value="all">— Усі заклади —</option>
        ${(S.schools||[]).filter(s=>s.serviced).map(s=>`<option value="${s.id}" ${filterSchool===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>
      ${filterSchool!=='all'?`<button class="btn btn-ghost btn-sm" onclick="filterSchool='all';render()">Скинути</button>`:''}
    </div>

    <div class="an-kpis">${kpiHtml}</div>

    <div class="split-grid">${splitBlock('ССОБ ЗРУП','zrup',d.zrupStats)}${splitBlock('СО СОБ ГУНП','gunp',d.gunpStats)}</div>

    <div class="card card-pad anim" style="margin-bottom:20px">
      <div class="card-head">
        <div class="section-title">${I.shield} Заходи за 16 тематичними напрямками</div>
        <span class="muted" style="font-size:13px">всього: ${F(d.totEvents)}</span>
      </div>
      <div class="cat-grid">${catHtml}</div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div class="card card-pad anim">
        <div class="card-head"><div class="section-title">${I.chart} Активність по місяцях</div></div>
        <div class="chart-box"><canvas id="cvLine"></canvas></div>
      </div>
      <div class="card card-pad anim">
        <div class="card-head"><div class="section-title">${I.filter} Топ напрямків</div></div>
        <div style="display:flex;gap:20px;align-items:center;margin-top:8px">
          <div class="dough-box"><canvas id="cvDough"></canvas></div>
          <div class="legend">${legendHtml}</div>
        </div>
      </div>
    </div>

    <div class="card card-pad anim">
      <div class="card-head">
        <div class="section-title">${I.trophy} Рейтинг закладів</div>
        <span class="muted" style="font-size:13px">${filtered.length} закладів</span>
      </div>
      <table class="tbl">
        <thead><tr><th></th><th>Заклад / Працівник</th><th>Заходи</th><th>Участей</th><th>Унікально охоплено</th><th>Охоплення</th><th>Консульт.</th></tr></thead>
        <tbody>${tblRows}</tbody>
      </table>
    </div>`;

  document.getElementById('filterSchoolEl')?.addEventListener('change', e=>{ filterSchool=e.target.value; render(); });

  /* Графіки */
  const gridColor='#EEF3FA';
  const noAxes={ grid:{display:false}, border:{display:false} };
  const yAxe={ beginAtZero:true, grid:{color:gridColor}, border:{display:false}, ticks:{precision:0} };

  /* Лінійний — реальна динаміка по місяцях з data.js */
  charts.line = new Chart(document.getElementById('cvLine'),{
    type:'line',
    data:{
      labels: d.mLabels,
      datasets:[
        {
          label:'Заходи (всього)', data: d.mEvents,
          borderColor:'#1F59DD', backgroundColor:ctx=>{
            const g=ctx.chart.ctx.createLinearGradient(0,0,0,280);
            g.addColorStop(0,'rgba(31,89,221,.22)'); g.addColorStop(1,'rgba(31,89,221,0)'); return g;
          }, fill:true, tension:.4, borderWidth:3, pointRadius:4, pointBackgroundColor:'#1F59DD', yAxisID:'y'
        },
        {
          label:'Охоплено учнів', data: d.mParts,
          borderColor:'#1AA56C', backgroundColor:'transparent',
          tension:.4, borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#1AA56C',
          borderDash:[5,3], yAxisID:'y1'
        }
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom',labels:{boxWidth:10,usePointStyle:true,padding:16}} },
      scales:{
        y:  { ...yAxe, position:'left',  title:{display:true,text:'Заходи',font:{size:11}} },
        y1: { ...yAxe, position:'right', title:{display:true,text:'Охоплених учнів',font:{size:11}}, grid:{display:false} },
        x:  noAxes
      }
    }
  });

  if(topCats.length){
    charts.dough = new Chart(document.getElementById('cvDough'),{
      type:'doughnut',
      data:{
        labels: topCats.map(t=>t.label),
        datasets:[{ data:topCats.map(t=>t.count), backgroundColor:topCats.map(t=>t.color), borderWidth:3, borderColor:'#fff' }]
      },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'66%',
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw}} } }
    });
  }
}

window.exportAnalytics = function(){
  const d = calcData();
  const bom = '﻿';
  const rows = ['"Напрямок","Заходів"\r\n'];
  (S.eventCategories||[]).forEach(c=>rows.push(`"${c.label}","${d.catStats[c.id]||0}"\r\n`));
  rows.push(`\r\n"Заклад","Місто","Заходів","Участей","Унікально охоплено","Охоплення %","Консультацій"\r\n`);
  d.serviced.forEach(s=>{
    const cov = window.calcCoverage?window.calcCoverage(s):{uniqueStudents:s.participants||0,coveragePercent:0};
    rows.push(`"${s.name}","${s.city||''}","${s.events||0}","${s.participants||0}","${cov.uniqueStudents}","${cov.coveragePercent}","${s.consultations||0}"\r\n`);
  });
  const blob = new Blob([bom+rows.join('')],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sob-аналітика-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Файл завантажується…');
};

document.addEventListener('sob:synced',()=>render());
render();
</script>
</body>
</html>

<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · Заклади освіти</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.sch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.sch-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; transition: transform .18s var(--ease), box-shadow .18s var(--ease); cursor: pointer; display: flex; flex-direction: column; }
.sch-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.sch-card .ph { height: 132px; position: relative; display: grid; place-items: center; color: rgba(255,255,255,.5); }
.sch-card .ph.serv { background: linear-gradient(135deg,var(--navy-700),var(--navy-950)); }
.sch-card .ph image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.sch-card .ph .badges { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; z-index: 2; }
.sch-card .body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; }
.sch-card .nm { font-weight: 700; font-size: 15.5px; line-height: 1.25; }
.sch-card .ad { font-size: 12.5px; color: var(--muted); margin-top: 5px; display: flex; gap: 5px; align-items: flex-start; }
.sch-card .ad svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; }
.sch-card .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.sch-card .stats .st { text-align: center; }
.sch-card .stats .st .v { font-weight: 800; font-size: 17px; letter-spacing: -.02em; }
.sch-card .stats .st .l { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
.sch-card .insp { display: flex; align-items: center; gap: 9px; margin-top: 14px; }
.sch-card .insp .av { width: 30px; height: 30px; border-radius: 9px; font-size: 11px; }
.sch-card .insp .n { font-size: 12.5px; font-weight: 600; line-height: 1.2; }
.sch-card .insp .r { font-size: 11px; color: var(--muted); }
.sch-card .insp .mine { margin-left: auto; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.fchip { padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; background: var(--surface); border: 1px solid var(--border-2); color: var(--text-2); cursor: pointer; transition: all .14s; }
.fchip.on { background: var(--navy-800); color: #fff; border-color: transparent; }
@media (max-width: 1080px){ .sch-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 700px){ .sch-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app" id="shell"></div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/shell.js"></script>
<script src="assets/image-slot.js"></script>
<script>
SOBShell.render({ active: 'schools', crumb: ['СОБ', 'Заклади освіти'] });
const S = window.SOB, F = window.fmt, I = window.ICON;
const U = window.SOBAuth.current();
const canEdit = window.SOBAuth.canEdit();

let typeFilter = 'all';
let onlyMine = false;
let textFilter = new URLSearchParams(location.search).get('q') || '';

document.getElementById('content').innerHTML = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Заклади освіти, які ми обслуговуємо</h1>
      <div class="page-sub">Заклади ${S.org.region}, закріплені за Службою освітньої безпеки</div>
    </div>
    ${canEdit ? `<a class="btn btn-primary" href="${U.role==='admin'?'admin.html':'cabinet.html'}">${I.plus} Додати заклад</a>` : ''}
  </div>

  <div class="row between wrap" style="margin-bottom:14px;gap:12px">
    <label style="display:flex;align-items:center;gap:8px;flex:1;max-width:380px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:0 13px">
      ${I.search}
      <input id="schTextSearch" type="text" placeholder="Пошук за назвою, адресою, містом…" value="${textFilter.replace(/"/g,'&quot;')}"
        style="flex:1;border:none;background:transparent;outline:none;font-size:14px;padding:10px 0">
    </label>
    <div class="filters" id="typeFilters"></div>
    ${U.role==='inspector' ? `<button class="fchip" id="mineToggle">${I.shield} Лише мої заклади</button>` : ''}
  </div>
  <div class="sch-grid" id="grid"></div>
`;

const types = ['all', ...new Set(S.schools.filter(s=>s.serviced).map(s=>s.type))];
const typeLabel = { all: 'Усі типи' };
document.getElementById('typeFilters').innerHTML = types.map(t =>
  `<button class="fchip ${t==='all'?'on':''}" data-t="${t}">${typeLabel[t]||t}</button>`).join('');

function render(){
  let list = S.schools.filter(s => s.serviced);
  if(typeFilter !== 'all') list = list.filter(s => s.type === typeFilter);
  if(onlyMine && U.role==='inspector') list = list.filter(s => s.inspector === U.inspector);
  if(textFilter.trim()){
    const q = textFilter.trim().toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.city||'').toLowerCase().includes(q) ||
      (s.address||'').toLowerCase().includes(q) ||
      (S.inspectors[s.inspector]?.name||'').toLowerCase().includes(q)
    );
  }
  list.sort((a,b)=>(b.rating||0)-(a.rating||0));

  if(!list.length){ document.getElementById('grid').innerHTML = `<div class="card card-pad" style="grid-column:1/-1;text-align:center;color:var(--muted)">Немає закладів за обраним фільтром</div>`; return; }

  document.getElementById('grid').innerHTML = list.map(s => {
    const ins = S.inspectors[s.inspector] || {};
    const init = (ins.name||'СОБ').split(' ').map(w=>w[0]).slice(0,2).join('');
    const mine = U.role==='inspector' && s.inspector===U.inspector;
    return `<div class="sch-card" onclick="location.href='school.html?id=${s.id}'">
      <div class="ph serv">
        <image-slot id="card-${s.id}" shape="rect" placeholder="Фото закладу"></image-slot>
        <div class="badges"><span class="tag gold" style="background:rgba(255,196,46,.95)">${I.star} ${s.rating||0}</span>${mine?`<span class="tag blue" style="background:rgba(255,255,255,.92)">Мій заклад</span>`:''}</div>
      </div>
      <div class="body">
        <div class="nm">${s.name}</div>
        <div class="ad">${I.pin}${s.address}</div>
        <div class="stats">
          <div class="st"><div class="v">${s.events||0}</div><div class="l">заходів</div></div>
          <div class="st"><div class="v">${s.prevention||0}</div><div class="l">профіл.</div></div>
          <div class="st"><div class="v">${F(s.participants||0)}</div><div class="l">учасн.</div></div>
        </div>
        <div class="insp"><div class="avatar-init av">${init}</div><div><div class="n">${(ins.name||'').split(' ').slice(0,2).join(' ')}</div><div class="r">${ins.rank||'Працівник СОБ'}</div></div></div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('schTextSearch').addEventListener('input', e => {
  textFilter = e.target.value;
  render();
});

document.getElementById('typeFilters').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  typeFilter = b.dataset.t;
  document.querySelectorAll('#typeFilters button').forEach(x=>x.classList.toggle('on', x===b));
  render();
});
document.getElementById('mineToggle')?.addEventListener('click', () => {
  onlyMine = !onlyMine;
  document.getElementById('mineToggle').classList.toggle('on', onlyMine);
  render();
});

render();
</script>
</body>
</html>

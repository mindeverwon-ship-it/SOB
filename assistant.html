<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · AI-помічник «Запитай інспектора»</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.ai-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 22px; align-items: start; }
.ai-chat { display: flex; flex-direction: column; height: calc(100vh - var(--topbar-h) - 56px); }
.ai-head {
  background: linear-gradient(135deg,var(--navy-850),var(--navy-950)); color: #fff;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 24px;
  display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden;
}
.ai-head::after { content:''; position:absolute; right:-30px; top:-30px; width:160px; height:160px; background:url('assets/sob-emblem.png') center/contain no-repeat; opacity:.08; }
.ai-av { width: 50px; height: 50px; border-radius: 14px; background: var(--gold-500); color: var(--navy-900); display: grid; place-items: center; flex-shrink: 0; }
.ai-av svg { width: 26px; height: 26px; }
.ai-head .ht b { font-size: 17px; font-weight: 800; }
.ai-head .ht .st { font-size: 12.5px; color: rgba(255,255,255,.6); display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.ai-head .ht .st .live { width: 8px; height: 8px; border-radius: 50%; background: var(--green-500); box-shadow: 0 0 0 3px rgba(30,158,106,.3); }
.ai-body { flex: 1; overflow-y: auto; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 11px; max-width: 86%; }
.msg .b { padding: 12px 15px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
.msg.bot .av { width: 32px; height: 32px; border-radius: 9px; background: var(--navy-800); color: var(--gold-500); display: grid; place-items: center; flex-shrink: 0; }
.msg.bot .av svg { width: 17px; height: 17px; }
.msg.bot .b { background: var(--surface-2); border: 1px solid var(--border); border-top-left-radius: 5px; color: var(--text); }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.user .b { background: var(--blue-600); color: #fff; border-top-right-radius: 5px; }
.msg .b p { margin: 0 0 8px; } .msg .b p:last-child { margin: 0; }
.msg .b p.mh { margin: 12px 0 5px; font-size: 14.5px; } .msg .b p.mh:first-child { margin-top: 0; }
.msg .b ul { margin: 6px 0 6px 18px; } .msg .b li { margin-bottom: 4px; }
.typing { display: flex; gap: 4px; padding: 14px 16px; }
.typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); animation: blink 1.2s infinite; }
.typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
@keyframes blink { 0%,60%,100%{opacity:.3} 30%{opacity:1} }
.refer-card { display: flex; align-items: center; gap: 12px; background: var(--gold-100); border: 1px solid var(--gold-500); border-radius: 13px; padding: 12px 14px; margin-top: 6px; }
.refer-card svg { width: 20px; height: 20px; color: var(--gold-600); flex-shrink: 0; }
.refer-card .rt { flex: 1; font-size: 13px; } .refer-card .rt b { display: block; }
.ai-foot { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 14px 16px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 13px; border-radius: 20px; background: var(--surface-2); border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .14s; }
.chip:hover { background: var(--blue-050); border-color: var(--blue-100); color: var(--blue-700); }
.chip svg { width: 15px; height: 15px; color: var(--blue-600); }
.ai-input { display: flex; gap: 10px; align-items: flex-end; }
.ai-input textarea { flex: 1; resize: none; border: 1px solid var(--border); border-radius: 13px; padding: 12px 15px; font-size: 14px; outline: none; max-height: 120px; line-height: 1.4; background: var(--surface-2); }
.ai-input textarea:focus { border-color: var(--blue-400); box-shadow: 0 0 0 3px var(--blue-050); }
.ai-send { width: 46px; height: 46px; border-radius: 13px; background: var(--blue-600); color: #fff; display: grid; place-items: center; flex-shrink: 0; transition: background .15s; }
.ai-send:hover { background: var(--blue-700); } .ai-send:disabled { opacity: .5; cursor: default; }
.ai-send svg { width: 19px; height: 19px; }
.side-card { padding: 18px; }
.topic-list { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; }
.topic { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 11px; font-size: 13.5px; cursor: pointer; transition: background .14s; }
.topic:hover { background: var(--surface-2); }
.topic .ti { width: 32px; height: 32px; border-radius: 9px; background: var(--blue-050); color: var(--blue-600); display: grid; place-items: center; flex-shrink: 0; }
.topic .ti svg { width: 16px; height: 16px; }
@media (max-width: 980px){ .ai-wrap { grid-template-columns: 1fr; } .ai-chat { height: 70vh; } }
</style>
</head>
<body>
<div class="app" id="shell"></div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/shell.js"></script>
<script>
SOBShell.render({ active: 'ai', crumb: ['СОБ', 'AI-помічник'] });
const S = window.SOB, I = window.ICON;

const topicsHtml = S.aiTopics.map(t =>
  `<div class="topic" data-q="${t.label}"><div class="ti">${I[t.icon]||I.ai}</div>${t.label}</div>`).join('');
const chipsHtml = S.aiTopics.slice(0,4).map(t =>
  `<div class="chip" data-q="${t.label}">${I[t.icon]||I.ai}${t.label}</div>`).join('');

document.getElementById('content').innerHTML = `
  <div class="page-head"><div><h1 class="page-title">AI-помічник «Запитай інспектора»</h1><div class="page-sub">Безпечні відповіді на питання щодо булінгу, кібербезпеки, шахрайства та правил безпеки</div></div></div>
  <div class="ai-wrap">
    <div class="ai-chat card" style="padding:0;overflow:hidden">
      <div class="ai-head">
        <div class="ai-av">${I.ai}</div>
        <div class="ht"><b>Запитай інспектора</b><div class="st"><span class="live"></span>Помічник онлайн · відповідає миттєво</div></div>
      </div>
      <div class="ai-body" id="chatBody"></div>
      <div class="ai-foot">
        <div class="chips">${chipsHtml}</div>
        <div class="ai-input">
          <textarea id="chatInput" rows="1" placeholder="Напишіть своє запитання…"></textarea>
          <button class="ai-send" id="sendBtn" aria-label="Надіслати">${I.send}</button>
        </div>
      </div>
    </div>
    <aside class="col" style="gap:16px">
      <div class="card side-card">
        <div class="section-title">${I.shield} Теми безпеки</div>
        <div class="topic-list">${topicsHtml}</div>
      </div>
      <div class="card side-card" style="background:var(--navy-900);color:#fff;border:none">
        <div style="font-weight:700;font-size:15px;display:flex;gap:9px;align-items:center">${I.phone} Потрібна жива розмова?</div>
        <p class="muted" style="color:rgba(255,255,255,.6);font-size:13px;margin:10px 0 14px">Якщо питання термінове або потребує втручання — зверніться до інспектора СОБ напряму.</p>
        <a class="btn btn-gold btn-sm" style="width:100%" href="communication.html">Звернутися до інспектора</a>
      </div>
    </aside>
  </div>
`;

const body = document.getElementById('chatBody');
const input = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const history = [];

const SYSTEM = `Ти — AI-помічник Служби освітньої безпеки (СОБ), структурного підрозділу Національної поліції України, що опікується безпекою в закладах освіти. Відповідай українською мовою, ввічливо, стисло і зрозуміло (для учнів, батьків та педагогів). Твоя тематика: булінг та цькування, кібербезпека, шахрайство, правила безпеки, поведінка у надзвичайних ситуаціях, права та обов'язки учнів. Давай практичні поради. Структуруй відповідь короткими абзацами або списком, якщо доречно. Якщо питання поза твоєю компетенцією, стосується конкретного інциденту, потребує втручання поліції чи має ознаки загрози життю — обов'язково поясни і додай у кінці окремим рядком: "[ЗВЕРНУТИСЯ]". У невідкладних випадках завжди нагадуй про номер 102. Пиши простим текстом, без заголовків із символами #.`;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function format(t){
  t = esc(t);
  const lines = t.split('\n');
  let html=''; let inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  lines.forEach(l=>{
    l = l.trim();
    if(!l){ return; }
    const inline = s => s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    if(/^#{1,6}\s+/.test(l)){ closeList(); html+='<p class="mh"><b>'+inline(l.replace(/^#{1,6}\s+/,''))+'</b></p>'; }
    else if(/^[-•*]\s+/.test(l)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(l.replace(/^[-•*]\s+/,''))+'</li>'; }
    else if(/^\d+\.\s+/.test(l)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(l.replace(/^\d+\.\s+/,''))+'</li>'; }
    else { closeList(); html+='<p>'+inline(l)+'</p>'; }
  });
  closeList();
  return html;
}

function addMsg(role, text, referral){
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'user':'bot');
  const avatar = role==='user' ? '' : `<div class="av">${I.ai}</div>`;
  const referHtml = referral ? `<div class="refer-card">${I.phone}<div class="rt"><b>Рекомендуємо звернутися до інспектора СОБ</b>Це питання краще вирішити з інспектором напряму.</div></div>` : '';
  div.innerHTML = `${avatar}<div class="b">${role==='user'?'<p>'+esc(text)+'</p>':format(text)}${referHtml}</div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping(){
  const d = document.createElement('div'); d.className='msg bot'; d.id='typing';
  d.innerHTML = `<div class="av">${I.ai}</div><div class="b" style="padding:0"><div class="typing"><i></i><i></i><i></i></div></div>`;
  body.appendChild(d); body.scrollTop = body.scrollHeight;
}
function hideTyping(){ document.getElementById('typing')?.remove(); }

const FALLBACK = {
  'булінг': 'Булінг — це систематичне цькування. Якщо ти стикнувся з цим:\n- Не мовчи — розкажи дорослому, якому довіряєш (вчителю, батькам, інспектору СОБ).\n- Збережи докази (скриншоти, повідомлення).\n- Не відповідай агресією.\nЗаклад освіти зобов\'язаний реагувати на кожне звернення. [ЗВЕРНУТИСЯ]',
  'кібербезпек': 'Базові правила кібербезпеки:\n- Не повідомляй нікому свої паролі та коди з SMS.\n- Використовуй складні різні паролі та двофакторну автентифікацію.\n- Не переходь за підозрілими посиланнями.\n- Перевіряй, з ким спілкуєшся в інтернеті.',
  'шахрайств': 'Щоб не стати жертвою шахраїв:\n- Ніколи не диктуй дані картки, CVV та коди з SMS.\n- Банк ніколи не телефонує з проханням "захистити рахунок".\n- Не переказуй гроші незнайомцям.\nЯкщо вас обманули — телефонуйте 102. [ЗВЕРНУТИСЯ]',
  'надзвичай': 'У надзвичайній ситуації:\n- Зберігай спокій, дій за інструкцією.\n- При сигналі тривоги — прямуй до укриття.\n- Знай шляхи евакуації у своєму закладі.\nЕкстрені номери: 101 (ДСНС), 102 (поліція), 103 (швидка).',
  'прав': 'Кожен учень має право на безпечне освітнє середовище, повагу та захист від насильства. Водночас зобов\'язаний дотримуватися правил закладу та поважати інших. Якщо твої права порушують — звернись до інспектора СОБ.',
};
function fallbackAnswer(q){
  const lq = q.toLowerCase();
  for(const k in FALLBACK){ if(lq.includes(k)) return FALLBACK[k]; }
  return 'Дякую за запитання! Я допомагаю з темами безпеки в закладах освіти: булінг, кібербезпека, шахрайство, правила поведінки та права учнів. Уточніть, будь ласка, питання — або зверніться до інспектора СОБ для детальної консультації. [ЗВЕРНУТИСЯ]';
}

async function ask(q){
  history.push({role:'user', text:q});
  addMsg('user', q);
  input.value=''; input.style.height='auto';
  sendBtn.disabled = true;
  showTyping();
  let answer = '';
  try {
    if(window.claude && window.claude.complete){
      const convo = history.map(m=>`${m.role==='user'?'Користувач':'Помічник'}: ${m.text}`).join('\n');
      answer = await window.claude.complete(SYSTEM + '\n\nДіалог:\n' + convo + '\nПомічник:');
    } else { throw new Error('no api'); }
  } catch(e){
    await new Promise(r=>setTimeout(r,700));
    answer = fallbackAnswer(q);
  }
  hideTyping();
  const referral = /\[ЗВЕРНУТИСЯ\]/.test(answer);
  answer = answer.replace(/\[ЗВЕРНУТИСЯ\]/g,'').trim();
  history.push({role:'assistant', text:answer});
  addMsg('bot', answer, referral);
  sendBtn.disabled = false;
}

// greeting
addMsg('bot', 'Вітаю! Я — AI-помічник Служби освітньої безпеки. Запитайте мене про булінг, кібербезпеку, шахрайство, правила безпеки чи права учнів. Я підкажу, що робити, і за потреби скерую до інспектора.');

sendBtn.addEventListener('click', () => { const q = input.value.trim(); if(q) ask(q); });
input.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); const q=input.value.trim(); if(q) ask(q); } });
input.addEventListener('input', () => { input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,120)+'px'; });
document.addEventListener('click', e => { const c = e.target.closest('[data-q]'); if(c && !sendBtn.disabled) ask(c.dataset.q); });
</script>
</body>
</html>

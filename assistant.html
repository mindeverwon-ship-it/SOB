<script>
SOBShell.render({ active: 'ai', crumb: ['СОБ', 'AI-аналітик'] });
const S = window.SOB, I = window.ICON;

/* Збір даних платформи для контексту */
function buildContext() {
  const ins = Object.entries(S.workers);
  const schools = S.schools.filter(s => s.serviced);
  const totalEvents = schools.reduce((s,sc) => s+(sc.events||0),0);
  const totalParticipants = schools.reduce((s,sc) => s+(sc.participants||0),0);
  const zrup = ins.filter(([,v]) => v.category==='ЗРУП');
  const gunp = ins.filter(([,v]) => v.category==='ГУНП');

  const topInspectors = schools.reduce((acc, sc) => {
    if(!sc.inspector) return acc;
    if(!acc[sc.inspector]) acc[sc.inspector] = { events:0, participants:0, schools:0 };
    acc[sc.inspector].events += sc.events||0;
    acc[sc.inspector].participants += sc.participants||0;
    acc[sc.inspector].schools += 1;
    return acc;
  }, {});

  const topList = Object.entries(topInspectors)
    .sort((a,b) => b[1].events - a[1].events)
    .slice(0,5)
    .map(([k,v]) => `- ${S.workers[k]?.name || k}: ${v.events} заходів, ${v.participants} осіб, ${v.schools} закладів`).join('\n');

  const noPhoto = schools.filter(s => !((s.gallery||[]).length) && s.events > 0).slice(0,5).map(s=>`- ${s.name}`).join('\n');
  const lowActivity = schools.filter(s => (s.events||0) < 3).slice(0,5).map(s=>`- ${s.name}: ${s.events||0} заходів`).join('\n');

  return `
Дані платформи СОБ на ${S.org.period}:

ЗАГАЛЬНА СТАТИСТИКА:
- Закладів під наглядом: ${schools.length}
- Всього заходів: ${totalEvents}
- Охоплено учасників: ${totalParticipants}
- Працівників ЗРУП: ${zrup.length}
- Працівників ГУНП: ${gunp.length}

ІНСПЕКТОРИ ЗРУП: ${zrup.map(([,v])=>v.name).join(', ')}
ІНСПЕКТОРИ ГУНП: ${gunp.map(([,v])=>v.name).join(', ')}

ТОП АКТИВНИХ ІНСПЕКТОРІВ (за кількістю заходів):
${topList || '- Дані не введено'}

ЗАКЛАДИ БЕЗ ФОТОЗВІТІВ (що мають заходи):
${noPhoto || '- Всі заклади мають фотозвіти'}

ЗАКЛАДИ З НИЗЬКОЮ АКТИВНІСТЮ (менше 3 заходів):
${lowActivity || '- Таких закладів немає'}

КАТЕГОРІЇ ЗАХОДІВ (звітна таблиця): ${(S.eventCategories||[]).map(c=>c.short).join(', ')}
`.trim();
}

const SYSTEM = `Ти — аналітичний AI-помічник керівника Служби освітньої безпеки (СОБ) при ГУНП Запорізької області. Відповідай ВИКЛЮЧНО українською мовою. Ти маєш прямий доступ до даних платформи.

Твої задачі:
- Аналізувати статистику роботи працівників СОБ
- Виявляти проблемні заклади та напрямки
- Формувати аналітичні довідки та рекомендації
- Порівнювати показники ГУНП та ЗРУП
- Допомагати керівнику приймати управлінські рішення

ПРАВИЛА ВІДПОВІДЕЙ:
- Відповідай конкретно, з цифрами з даних платформи
- Структуруй відповідь чіткими заголовками та списками
- Виявляй тенденції та аномалії
- Давай конкретні рекомендації
- Якщо даних недостатньо — чесно повідом про це
- Пиши коротко та аналітично, без зайвих слів`;

const chips = (S.aiTopics||[]).slice(0,4);
const topicsAll = S.aiTopics||[];

let schCtx = '';
try { schCtx = buildContext(); } catch(e) {}

document.getElementById('content').innerHTML = `
  <div class="page-head">
    <div><h1 class="page-title">AI-аналітик СОБ</h1>
    <div class="page-sub">Інтелектуальний помічник керівника — аналізує дані платформи в реальному часі</div></div>
  </div>
  <div class="ai-layout">
    <div class="ai-chat card" style="padding:0;overflow:hidden">
      <div class="ai-head">
        <div class="ai-av">${I.ai}</div>
        <div class="ht">
          <b>AI-аналітик СОБ</b>
          <div class="st"><span class="live"></span>Аналізує дані платформи в реальному часі</div>
        </div>
        <div class="db-badge">
          <span style="opacity:.7">Закладів у базі</span>
          <b>${S.schools.filter(s=>s.serviced).length} / ${S.schools.length}</b>
        </div>
      </div>
      <div class="ai-body" id="chatBody"></div>
      <div class="ai-foot">
        <div class="chips" id="chipsRow">
          ${chips.map(t=>`<div class="chip" data-q="${t.label}">${I[t.icon]||I.ai} <span>${t.label}</span></div>`).join('')}
        </div>
        <div class="ai-input">
          <textarea id="chatInput" rows="1" placeholder="Запитайте про статистику, працівників СОБ, проблемні заклади…"></textarea>
          <button class="ai-send" id="sendBtn" aria-label="Надіслати">${I.send}</button>
        </div>
      </div>
    </div>
    <aside style="overflow-y:auto">
      <div class="side-section">
        <div class="section-title" style="margin-bottom:12px">${I.chart} Поточні дані</div>
        <div class="data-pill"><span>Всього заходів</span><b>${S.schools.filter(s=>s.serviced).reduce((s,sc)=>s+(sc.events||0),0)}</b></div>
        <div class="data-pill"><span>Охоплено осіб</span><b>${S.schools.filter(s=>s.serviced).reduce((s,sc)=>s+(sc.participants||0),0)}</b></div>
        <div class="data-pill"><span>Заклади під наглядом</span><b>${S.schools.filter(s=>s.serviced).length}</b></div>
        <div class="data-pill"><span>Інспекторів ЗРУП</span><b>${Object.values(S.workers).filter(v=>v.category==='ЗРУП').length}</b></div>
        <div class="data-pill"><span>Інспекторів ГУНП</span><b>${Object.values(S.workers).filter(v=>v.category==='ГУНП').length}</b></div>
      </div>
      <div class="side-section">
        <div class="section-title" style="margin-bottom:10px">${I.shield} Типові запити</div>
        ${topicsAll.map(t=>`<div class="topic" data-q="${t.label}"><div class="ti">${I[t.icon]||I.ai}</div><span>${t.label}</span></div>`).join('')}
      </div>
    </aside>
  </div>
`;

const body = document.getElementById('chatBody');
const input = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const history = [];

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function format(t) {
  t = esc(t);
  const lines = t.split('\n');
  let html = ''; let inList = false;
  const closeList = () => { if(inList){html+='</ul>';inList=false;} };
  lines.forEach(l => {
    l = l.trim(); if(!l) return;
    const inline = s => s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code style="background:var(--surface-3);padding:1px 5px;border-radius:4px">$1</code>');
    if(/^#{1,6}\s+/.test(l)){ closeList(); html+=`<p class="mh"><b>${inline(l.replace(/^#{1,6}\s+/,''))}</b></p>`; }
    else if(/^[-•*]\s+/.test(l)){ if(!inList){html+='<ul>';inList=true;} html+=`<li>${inline(l.replace(/^[-•*]\s+/,''))}</li>`; }
    else if(/^\d+\.\s+/.test(l)){ if(!inList){html+='<ul>';inList=true;} html+=`<li>${inline(l.replace(/^\d+\.\s+/,''))}</li>`; }
    else { closeList(); html+=`<p>${inline(l)}</p>`; }
  });
  closeList();
  return html;
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'user':'bot');
  const avatar = role==='user' ? '' : `<div class="av">${I.ai}</div>`;
  div.innerHTML = `${avatar}<div class="b">${role==='user'?`<p>${esc(text)}</p>`:format(text)}</div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping(){ const d=document.createElement('div'); d.className='msg bot'; d.id='typing'; d.innerHTML=`<div class="av">${I.ai}</div><div class="b" style="padding:0"><div class="typing"><i></i><i></i><i></i></div></div>`; body.appendChild(d); body.scrollTop=body.scrollHeight; }
function hideTyping(){ document.getElementById('typing')?.remove(); }

/* Аналітична відповідь на основі даних платформи */
function analyticAnswer(q) {
  const lq = q.toLowerCase();
  const schools = S.schools.filter(s => s.serviced);
  const ins = Object.entries(S.workers);
  const zrup = ins.filter(([,v]) => v.category==='ЗРУП');
  const gunp = ins.filter(([,v]) => v.category==='ГУНП');

  /* Топ активних */
  if(lq.includes('активн') || lq.includes('рейтинг') || lq.includes('топ')) {
    const stat = {};
    schools.forEach(s => { if(!s.inspector) return; if(!stat[s.inspector]) stat[s.inspector]={ev:0,part:0,sc:0}; stat[s.inspector].ev+=s.events||0; stat[s.inspector].part+=s.participants||0; stat[s.inspector].sc++; });
    const top = Object.entries(stat).sort((a,b)=>b[1].ev-a[1].ev);
    if(!top.length) return `За поточний місяць дані про заходи ще не внесені. Зверніться до працівників СОБ для актуалізації звітності.`;
    const rows = top.map(([k,v],i)=>`${i+1}. **${S.workers[k]?.name||k}** — ${v.ev} заходів, ${v.part} охоплено, ${v.sc} закладів`).join('\n');
    return `## Рейтинг активності працівників СОБ за ${S.org.period}\n\n${rows}\n\n**Рекомендація:** ${top[0]?`${S.workers[top[0][0]]?.name||top[0][0]} показує найвищу активність — варто поширити цей досвід.`:'Внесіть дані для аналізу.'}`;
  }

  /* Проблемні заклади / без фотозвітів */
  if(lq.includes('фото') || lq.includes('звіт') || lq.includes('без')) {
    const noPhoto = schools.filter(s => !(s.gallery||[]).length);
    if(!noPhoto.length) return `Всі заклади під наглядом подали фотозвіти. Відмінний результат!`;
    const list = noPhoto.slice(0,10).map(s=>`- **${s.name}** (${S.workers[s.inspector]?.name?.split(' ')[0]||'?'})`).join('\n');
    return `## Заклади без фотозвітів\n\n${noPhoto.length} закладів ще не подали фотозвіти:\n\n${list}${noPhoto.length>10?`\n\n...та ще ${noPhoto.length-10} закладів.`:''}\n\n**Рекомендація:** Нагадати відповідним працівникам СОБ про необхідність завантаження фотозвітів.`;
  }

  /* Порівняння ГУНП vs ЗРУП */
  if(lq.includes('гунп') || lq.includes('зруп') || lq.includes('порівн')) {
    const calc = (list) => {
      const schList = schools.filter(s => list.find(([k])=>k===s.inspector));
      return { ev: schList.reduce((s,sc)=>s+(sc.events||0),0), part: schList.reduce((s,sc)=>s+(sc.participants||0),0), sc: schList.length, ins: list.length };
    };
    const zs = calc(zrup), gs = calc(gunp);
    return `## Порівняння ЗРУП та ГУНП — ${S.org.period}\n\n| Показник | ССОБ ЗРУП | ГУНП |\n|---|---|---|\n| Працівників | ${zs.ins} | ${gs.ins} |\n| Закладів | ${zs.sc} | ${gs.sc} |\n| Заходів | ${zs.ev} | ${gs.ev} |\n| Охоплено осіб | ${zs.part} | ${gs.part} |\n\n**Висновок:** ${zs.ev > gs.ev ? 'ЗРУП показує вищу активність за кількістю заходів.' : gs.ev > zs.ev ? 'ГУНП показує вищу активність.' : 'Показники рівні.'}`;
  }

  /* Аналітична довідка */
  if(lq.includes('довідк') || lq.includes('звіт') || lq.includes('доповідь') || lq.includes('аналіт')) {
    const totalEv = schools.reduce((s,sc)=>s+(sc.events||0),0);
    const totalPart = schools.reduce((s,sc)=>s+(sc.participants||0),0);
    const active = schools.filter(s=>s.events>0).length;
    const inactive = schools.filter(s=>!s.events||s.events===0).length;
    const zs_ev = schools.filter(s=>zrup.find(([k])=>k===s.inspector)).reduce((s,sc)=>s+(sc.events||0),0);
    const gs_ev = schools.filter(s=>gunp.find(([k])=>k===s.inspector)).reduce((s,sc)=>s+(sc.events||0),0);
    return `## Аналітична довідка СОБ за ${S.org.period}\n\n**Загальні показники:**\n- Закладів під наглядом: ${schools.length}\n- Проведено заходів: ${totalEv}\n- Охоплено учасників: ${totalPart}\n- Активних закладів: ${active}\n- Без активності: ${inactive}\n\n**По підрозділах:**\n- ССОБ ЗРУП: ${zrup.length} інспекторів, ${zs_ev} заходів\n- ГУНП: ${gunp.length} інспекторів, ${gs_ev} заходів\n\n**Стан звітності:**\n- Фотозвіти відсутні у ${schools.filter(s=>!(s.gallery||[]).length).length} закладах\n\n**Рекомендації:**\n- Активізувати роботу в ${inactive} закладах без показників\n- Забезпечити повне охоплення фотозвітами\n- Провести нараду з працівниками СОБ щодо підвищення показників`;
  }

  /* Проблемні напрямки */
  if(lq.includes('проблем') || lq.includes('напрям')) {
    const lowSchools = schools.filter(s=>(!s.events||s.events<3) && s.serviced).length;
    const noInsp = schools.filter(s=>!s.inspector).length;
    return `## Проблемні напрямки роботи СОБ\n\n**Виявлені проблеми:**\n- ${lowSchools} закладів з активністю менше 3 заходів на місяць\n- ${noInsp} закладів без призначеного працівника СОБ\n- ${schools.filter(s=>!(s.gallery||[]).length).length} закладів без фотодокументування\n\n**Пріоритетні дії:**\n1. Призначити відповідальних працівників СОБ до закладів без куратора\n2. Запровадити обов'язковий фотозвіт після кожного заходу\n3. Встановити мінімальний план — 5 заходів на місяць на заклад\n4. Щотижнево моніторити динаміку закладів з нульовою активністю`;
  }

  /* Загальна аналітика */
  const totalEv = schools.reduce((s,sc)=>s+(sc.events||0),0);
  const totalPart = schools.reduce((s,sc)=>s+(sc.participants||0),0);
  return `Дякую за запит. Ось зведені дані платформи за **${S.org.period}**:\n\n- Закладів під наглядом: **${schools.length}**\n- Проведено заходів: **${totalEv}**\n- Охоплено учасників: **${totalPart}**\n- Працівників ЗРУП: **${zrup.length}**\n- Працівників ГУНП: **${gunp.length}**\n\nУточніть запит — наприклад: "Покажи рейтинг працівників СОБ", "Аналітична довідка за місяць", "Порівняй ГУНП та ЗРУП", "Проблемні напрямки".`;
}

async function ask(q) {
  history.push({role:'user', text:q});
  addMsg('user', q);
  input.value=''; input.style.height='auto';
  sendBtn.disabled = true;
  showTyping();

  let answer = '';
  try {
    if(window.claude && window.claude.complete) {
      const msgs = history.map(m=>`${m.role==='user'?'Керівник':'Аналітик'}: ${m.text}`).join('\n');
      const fullPrompt = SYSTEM + '\n\nДАНІ ПЛАТФОРМИ:\n' + schCtx + '\n\nДіалог:\n' + msgs + '\nАналітик:';
      answer = await window.claude.complete(fullPrompt);
    } else { throw new Error('no api'); }
  } catch(e) {
    await new Promise(r=>setTimeout(r,600+Math.random()*400));
    answer = analyticAnswer(q);
  }
  hideTyping();
  history.push({role:'assistant', text:answer});
  addMsg('bot', answer);
  sendBtn.disabled = false;
}

/* Привітальне повідомлення */
const schools = S.schools.filter(s=>s.serviced);
const totalEv = schools.reduce((s,sc)=>s+(sc.events||0),0);
const totalPart = schools.reduce((s,sc)=>s+(sc.participants||0),0);
addMsg('bot', `## Вітаю, ${window.SOBAuth.current().name.split(' ')[0]}!\n\nЯ — AI-аналітик Служби освітньої безпеки. Маю доступ до всіх даних платформи.\n\n**Поточний стан (${S.org.period}):**\n- Заходів проведено: **${totalEv}**\n- Осіб охоплено: **${totalPart}**\n- Закладів під наглядом: **${schools.length}**\n\nЗапитайте мене про статистику, рейтинг працівників СОБ, проблемні заклади або підготовку доповіді.`);

sendBtn.addEventListener('click', () => { const q=input.value.trim(); if(q) ask(q); });
input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const q=input.value.trim();if(q)ask(q);} });
input.addEventListener('input', () => { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; });
document.addEventListener('click', e => { const c=e.target.closest('[data-q]'); if(c&&!sendBtn.disabled) ask(c.dataset.q); });
</script>

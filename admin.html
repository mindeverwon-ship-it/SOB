<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · Адмін-панель</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.adm-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.adm-tab{padding:12px 18px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;transition:color .15s}
.adm-tab:hover{color:var(--text)}.adm-tab.active{color:var(--blue-600);border-bottom-color:var(--blue-600)}
.tbl .badge-serv{display:inline-flex;align-items:center;gap:5px}
.iact{color:var(--muted-2);padding:6px;border-radius:8px;transition:all .14s}
.iact:hover{background:var(--surface-3);color:var(--text)}.iact.del:hover{background:var(--red-100);color:var(--red-500)}
.iact svg{width:16px;height:16px;display:block}
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm)}
.sc .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}
.sc .v{font-size:27px;font-weight:800;letter-spacing:-.02em}.sc .l{font-size:13px;color:var(--muted);margin-top:3px}
.danger-zone{border:1px solid var(--red-100);background:#fff;border-radius:var(--radius-lg);padding:22px;margin-top:8px}
.gate{max-width:440px;margin:80px auto;text-align:center}
.gate .ic{width:64px;height:64px;border-radius:18px;background:var(--purple-100);color:var(--purple-500);display:grid;place-items:center;margin:0 auto 18px}
.gate .ic svg{width:30px;height:30px}
.usr-row .av{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:10px}
.ins-card .ins-top{display:flex;align-items:center;gap:13px}
.ins-card .av{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.ins-card .ins-name{font-weight:700;font-size:15px;line-height:1.2}
.ins-card .ins-rank{font-size:12px;color:var(--muted);margin-top:2px}
.ins-card .ins-contacts{display:flex;flex-direction:column;gap:5px;padding-top:8px;border-top:1px solid var(--border)}
.ins-contact-line{display:flex;align-items:center;gap:8px;font-size:13px}
.ins-contact-line svg{width:14px;height:14px;color:var(--blue-600);flex-shrink:0}
.ins-card .ins-actions{display:flex;gap:6px;margin-top:4px}
.ins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:12px}
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:10px 14px 10px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface-2);outline:none}
.search-bar input:focus{border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-050)}
.search-bar .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-bar .si svg{width:16px;height:16px}
.rpt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.rpt-card+.rpt-card{margin-top:14px}
.rpt-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-top:1px solid var(--border)}
.rpt-row:first-child{border-top:none}
.rpt-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.period-select{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
@media(max-width:1080px){.stat-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){
  .stat-cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .ins-grid{grid-template-columns:1fr}
  /* schools table — hide less important columns on mobile */
  .tbl th:nth-child(2),.tbl td:nth-child(2),
  .tbl th:nth-child(3),.tbl td:nth-child(3),
  .tbl th:nth-child(6),.tbl td:nth-child(6){display:none}
  .tbl td,.tbl th{padding:10px 8px;font-size:13px}
  .adm-tab{padding:10px 12px;font-size:13px}
}
@media(max-width:420px){
  .stat-cards{grid-template-columns:1fr}
}
.adm-sch-block{margin-bottom:24px}
.adm-sch-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.adm-photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.adm-photo-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.adm-photo-grid{grid-template-columns:repeat(2,1fr)}}
.adm-photo-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.adm-photo-card img{width:100%;height:120px;object-fit:cover;display:block}
.adm-photo-empty{width:100%;height:120px;display:grid;place-items:center;background:var(--surface-3);color:var(--muted-2)}
.adm-photo-info{padding:8px 10px}
.adm-photo-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-photo-meta{font-size:11px;color:var(--muted);margin-top:2px}
.adm-photo-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border-radius:8px;padding:5px 7px;font-size:12px;line-height:1;display:flex;align-items:center;opacity:0;transition:opacity .15s}
.adm-photo-card:hover .adm-photo-del{opacity:1}
</style>
</head>
<body>
<div class="app" id="shell"></div>

<!-- ══ Inspector modal ══ -->
<div class="modal-scrim" id="insModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-head"><div class="section-title" id="insModalTitle">Додати працівника СОБ</div><button class="icon-btn" onclick="closeModal('insModal')" id="closeIns"></button></div>
    <div class="modal-body col" style="gap:14px">
      <div class="field"><label>ПІБ <span style="color:var(--red-500)">*</span></label><input class="input" id="i_name" placeholder="Прізвище Ім'я По-батькові"></div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Посада / звання</label><input class="input" id="i_rank_title" placeholder="Старший інспектор ССОБ"></div>
        <div class="field"><label>Підрозділ <span style="color:var(--red-500)">*</span></label>
          <select class="input" id="i_category">
            <option value="ЗРУП">ССОБ ЗРУП</option>
            <option value="ГУНП">ГУНП</option>
          </select>
        </div>
      </div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Службовий телефон</label><input class="input" id="i_phone" placeholder="+380 (61) …" type="tel"></div>
        <div class="field"><label>Мобільний телефон</label><input class="input" id="i_phone2" placeholder="+380 (67) …" type="tel"></div>
      </div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Email</label><input class="input" id="i_email" placeholder="@gp.npu.gov.ua" type="email"></div>
        <div class="field"><label>Telegram</label><input class="input" id="i_telegram" placeholder="@username або +380…"></div>
      </div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Район обслуговування</label><input class="input" id="i_district" placeholder="Вільнянська ТГ"></div>
        <div class="field"><label>Дата призначення</label><input class="input" type="date" id="i_appointedAt"></div>
      </div>
      <div class="field">
        <label>Статус</label>
        <div style="display:flex;gap:16px;margin-top:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600"><input type="radio" name="i_status" value="active" id="i_active" style="accent-color:var(--blue-600)"> Активний</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600"><input type="radio" name="i_status" value="inactive" id="i_inactive" style="accent-color:var(--red-500)"> Неактивний</label>
        </div>
      </div>
      <div class="field"><label>Примітки</label><textarea class="input" id="i_note" rows="2" placeholder="Додаткова інформація…" style="resize:vertical"></textarea></div>
      <div class="field">
        <label>Колір аватара</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="colorPicker"></div>
        <input type="hidden" id="i_color" value="#1F59DD">
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('insModal')">Скасувати</button><button class="btn btn-primary" id="saveIns">Зберегти</button></div>
  </div>
</div>

<!-- ══ School modal ══ -->
<div class="modal-scrim" id="schModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-head"><div class="section-title" id="schModalTitle">Додати заклад</div><button class="icon-btn" onclick="closeModal('schModal')" id="closeSch"></button></div>
    <div class="modal-body col" style="gap:14px">
      <div class="field"><label>Назва закладу <span style="color:var(--red-500)">*</span></label><input class="input" id="m_name" placeholder="Запорізька гімназія №11"></div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Тип</label><input class="input" id="m_type" placeholder="Ліцей / Гімназія / ЗОШ"></div>
        <div class="field"><label>Місто / село</label><input class="input" id="m_city" placeholder="м. Запоріжжя"></div>
      </div>
      <div class="field"><label>Адреса</label><input class="input" id="m_address" placeholder="вул. …, місто"></div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Директор</label><input class="input" id="m_director"></div>
        <div class="field"><label>Телефон</label><input class="input" id="m_phone"></div>
      </div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Email</label><input class="input" id="m_email" placeholder="school@…" type="email"></div>
        <div class="field"><label>Вебсайт</label><input class="input" id="m_website" placeholder="https://…"></div>
      </div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Координата (широта)</label><input class="input" id="m_lat" type="number" step="0.0001" placeholder="47.84"></div>
        <div class="field"><label>Координата (довгота)</label><input class="input" id="m_lng" type="number" step="0.0001" placeholder="35.13"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:-6px">Google Maps: правий клік → «Що тут?»</div>
      <div class="grid-2" style="gap:13px">
        <div class="field"><label>Відповідальний працівник СОБ</label><select class="input" id="m_inspector"></select></div>
        <div class="field"><label>Обслуговується СОБ</label><select class="input" id="m_serviced"><option value="true">Так — наш заклад</option><option value="false">Ні — інший заклад</option></select></div>
      </div>
      <div class="field"><label>Загальна кількість дітей у закладі</label><input class="input" id="m_students" type="number" min="0" placeholder="Напр. 420 — загальний контингент учнів"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('schModal')">Скасувати</button><button class="btn btn-primary" id="saveSch">Зберегти</button></div>
  </div>
</div>

<input type="file" id="importInput" accept="application/json" style="display:none">

<script src="js/data.js?v=14"></script>
<script src="js/store.js?v=17"></script>
<script src="js/shell.js?v=5"></script>
<script>
const S=window.SOB, F=window.fmt, I=window.ICON;
const U=window.SOBAuth.current();
SOBShell.render({ active:'admin', crumb:['СОБ','Адмін-панель'] });

if(U.role!=='admin'){
  document.getElementById('content').innerHTML=`<div class="gate"><div class="ic">${I.lock}</div><h1 class="page-title">Доступ обмежено</h1><p class="page-sub" style="margin-bottom:24px">Адмін-панель доступна лише адміністратору системи.</p><a class="btn btn-primary btn-lg" href="login.html">${I.logout} Увійти як адміністратор</a></div>`;
} else {
  document.getElementById('closeSch').innerHTML=I.close;
  document.getElementById('closeIns').innerHTML=I.close;
  let tab='schools', editingId=null, editingInsKey=null;
  let schSearch='', insSearch='';
  window._insFilterCat = 'all';

  /* ── color picker ── */
  const COLORS=['#1F59DD','#1AA56C','#E84545','#7B4FD1','#FF7A00','#0E274D','#1E9E6A','#C8390B'];
  (function buildPicker(){
    const cp=document.getElementById('colorPicker'); if(!cp) return;
    COLORS.forEach(c=>{
      const d=document.createElement('div');
      d.dataset.color=c;
      d.style.cssText=`width:28px;height:28px;border-radius:8px;background:${c};cursor:pointer;border:2px solid transparent;transition:border .12s`;
      d.addEventListener('click',()=>selectColor(c));
      cp.appendChild(d);
    });
  })();
  window.selectColor=function(c){
    document.getElementById('i_color').value=c;
    document.querySelectorAll('#colorPicker [data-color]').forEach(el=>el.style.border=el.dataset.color===c?'3px solid #fff':'2px solid transparent');
    document.querySelectorAll('#colorPicker [data-color]').forEach(el=>el.style.outline=el.dataset.color===c?'2px solid '+c:'none');
  };
  selectColor('#1F59DD');

  /* ── Inspector modal ── */
  function openIns(key){
    editingInsKey=key;
    document.getElementById('insModalTitle').textContent=key?'Редагувати працівника СОБ':'Додати працівника СОБ';
    const ins=key?(S.inspectors[key]||{}):{};
    document.getElementById('i_name').value=ins.name||'';
    document.getElementById('i_rank_title').value=ins.rank||ins.rankTitle||'';
    document.getElementById('i_category').value=ins.category||'ЗРУП';
    document.getElementById('i_phone').value=ins.phone||'';
    document.getElementById('i_phone2').value=ins.phone2||'';
    document.getElementById('i_email').value=ins.email||'';
    document.getElementById('i_telegram').value=ins.telegram||'';
    document.getElementById('i_district').value=ins.district||'';
    document.getElementById('i_appointedAt').value=ins.appointedAt||'';
    document.getElementById('i_note').value=ins.note||ins.notes||'';
    document.getElementById(ins.status==='inactive'?'i_inactive':'i_active').checked=true;
    selectColor(ins.color||'#1F59DD');
    openModal('insModal');
  }
  document.getElementById('saveIns').addEventListener('click',()=>{
    const name=document.getElementById('i_name').value.trim();
    if(!name){toast('Введіть ПІБ працівника СОБ','red');return;}
    const category=document.getElementById('i_category').value;
    const data={
      name,
      rank: document.getElementById('i_rank_title').value.trim()||'Інспектор ССОБ',
      category,
      department: category==='ГУНП'?'ГУНП':'ССОБ ЗРУП',
      phone:       document.getElementById('i_phone').value.trim(),
      phone2:      document.getElementById('i_phone2').value.trim(),
      email:       document.getElementById('i_email').value.trim(),
      telegram:    document.getElementById('i_telegram').value.trim(),
      district:    document.getElementById('i_district').value.trim(),
      appointedAt: document.getElementById('i_appointedAt').value,
      status:      document.querySelector('input[name="i_status"]:checked')?.value||'active',
      notes:       document.getElementById('i_note').value.trim(),
      color:       document.getElementById('i_color').value,
    };
    if(editingInsKey){
      S.inspectors[editingInsKey]=Object.assign(S.inspectors[editingInsKey]||{},data);
    } else {
      const key=name.toLowerCase().replace(/\s+/g,'').slice(0,6)+Date.now().toString(36).slice(-3);
      S.inspectors[key]=Object.assign({schools:[]},data);
    }
    window.SOBStore.save();
    buildInspectorSelect();
    toast(editingInsKey?'Працівника оновлено':'Працівника додано');
    closeModal('insModal');
    shell();
  });

  function buildInspectorSelect(){
    document.getElementById('m_inspector').innerHTML='<option value="">— не призначено —</option>'+
      Object.entries(S.inspectors).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
  }

  /* ── Main shell ── */
  function shell(){
    const serviced=S.schools.filter(s=>s.serviced).length;
    document.getElementById('content').innerHTML=`
      <div class="page-head"><div><h1 class="page-title">Адмін-панель</h1><div class="page-sub">Керування закладами, працівниками СОБ, звітами та даними системи</div></div></div>
      <div class="stat-cards">
        <div class="sc"><div class="ic" style="background:var(--blue-100);color:var(--blue-600)">${I.school}</div><div class="v">${S.schools.length}</div><div class="l">Закладів у системі</div></div>
        <div class="sc"><div class="ic" style="background:var(--green-100);color:var(--green-500)">${I.shield}</div><div class="v">${serviced}</div><div class="l">Обслуговує СОБ</div></div>
        <div class="sc"><div class="ic" style="background:var(--gold-100);color:var(--gold-700)">${I.users}</div><div class="v">${Object.keys(S.inspectors).length}</div><div class="l">Працівників СОБ</div></div>
        <div class="sc"><div class="ic" style="background:var(--purple-100);color:var(--purple-500)">${I.calendar}</div><div class="v">${S.schoolEvents.length}</div><div class="l">Заходів у журналі</div></div>
      </div>
      <div class="adm-tabs">
        <div class="adm-tab ${tab==='schools'?'active':''}" data-t="schools">Заклади освіти</div>
        <div class="adm-tab ${tab==='inspectors'?'active':''}" data-t="inspectors">Працівники СОБ</div>
        <div class="adm-tab ${tab==='users'?'active':''}" data-t="users">Користувачі</div>
        <div class="adm-tab ${tab==='reports'?'active':''}" data-t="reports">Звіти та скачування</div>
        <div class="adm-tab ${tab==='gallery'?'active':''}" data-t="gallery">Фотогалерея</div>
        <div class="adm-tab ${tab==='auditlog'?'active':''}" data-t="auditlog">Журнал аудиту</div>
        <div class="adm-tab ${tab==='data'?'active':''}" data-t="data">Налаштування</div>
      </div>
      <div id="admBody"></div>`;
    document.querySelectorAll('.adm-tab').forEach(t=>t.addEventListener('click',()=>{
      tab=t.dataset.t;
      document.querySelectorAll('.adm-tab').forEach(x=>x.classList.toggle('active',x===t));
      renderTab();
    }));
    renderTab();
  }

  function renderTab(){
    if(tab==='schools') renderSchools();
    else if(tab==='inspectors') renderInspectors();
    else if(tab==='users') renderUsers();
    else if(tab==='reports') renderReports();
    else if(tab==='gallery') renderGallery();
    else if(tab==='auditlog') renderAuditLog();
    else renderData();
  }

  /* ── Gallery tab ── */
  function renderGallery(){
    const gallery = S.gallery || [];
    /* Cloudinary — безкоштовний план 25 ГБ. Розрахунок: base64 (старі записи) + ~500 КБ/фото для Cloudinary */
    const totalSizeKb = gallery.reduce((s,g) => {
      if (g.dataUrl) return s + Math.round(g.dataUrl.length * 0.75 / 1024);
      if (g.source === 'cloudinary' || g.url) return s + 500; /* ~500 КБ/фото */
      return s;
    }, 0);
    const cloudinaryLimitKb = 25 * 1024 * 1024; /* 25 ГБ */
    const sizeStr = totalSizeKb > 1024*1024 ? (totalSizeKb/1024/1024).toFixed(1)+' ГБ' : totalSizeKb > 1024 ? (totalSizeKb/1024).toFixed(0)+' МБ' : totalSizeKb+' КБ';
    const pct = Math.min(100, Math.round(totalSizeKb / cloudinaryLimitKb * 100));
    const pctColor = pct > 80 ? 'var(--red-500)' : pct > 50 ? 'var(--gold-600)' : 'var(--green-600)';

    // group by school
    const bySchool = {};
    gallery.forEach(g => { (bySchool[g.schoolId] = bySchool[g.schoolId]||[]).push(g); });

    const schoolSections = Object.keys(bySchool).map(sid => {
      const sc = S.schools.find(x=>x.id===sid)||{name:'Без закладу'};
      const photos = bySchool[sid];
      const cards = photos.map(g => {
        const dt = g.date ? new Date(g.date).toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'}) : (g.month||'');
        return `<div class="adm-photo-card">
          ${(g.dataUrl||g.url) ? `<img src="${g.dataUrl||g.url}" loading="lazy" style="width:100%;height:120px;object-fit:cover;border-radius:8px">` : `<div class="adm-photo-empty">${I.image}</div>`}
          <div class="adm-photo-info">
            <div class="adm-photo-title">${g.title||'Без назви'}</div>
            <div class="adm-photo-meta">${dt}${g.author?' · '+g.author:''}</div>
          </div>
          <button class="adm-photo-del" data-gid="${g.id}" title="Видалити фото">${I.trash}</button>
        </div>`;
      }).join('');
      return `<div class="adm-sch-block">
        <div class="adm-sch-head">
          <span>${I.building} <b>${sc.name}</b></span>
          <span class="muted" style="font-size:13px">${photos.length} фото</span>
          <button class="btn btn-sm" style="background:var(--red-100);color:var(--red-500);margin-left:auto" data-del-school="${sid}">
            ${I.trash} Видалити всі (${photos.length})
          </button>
        </div>
        <div class="adm-photo-grid">${cards}</div>
      </div>`;
    }).join('');

    document.getElementById('admBody').innerHTML = `

    });
    document.getElementById('resetBtn').addEventListener('click',()=>{
      if(confirm('Скинути ВСІ дані до початкових? Зміни буде втрачено.')){
        window.SOBStore.reset(); toast('Дані скинуто','navy'); setTimeout(()=>location.reload(),700);
      }
    });
  }

  /* ── School modal ── */
  function openModal(id){document.getElementById(id).classList.add('show');}
  window.closeModal=id=>document.getElementById(id).classList.remove('show');
  buildInspectorSelect();

  function openSch(id){
    editingId=id;
    document.getElementById('schModalTitle').textContent=id?'Редагувати заклад':'Додати заклад';
    const s=id?S.schools.find(x=>x.id===id):{};
    ['name','address','type','city','director','phone','email','website'].forEach(k=>{
      const el=document.getElementById('m_'+k); if(el) el.value=s[k]||'';
    });
    document.getElementById('m_students').value = s.students || '';
    document.getElementById('m_lat').value=s.lat||S.org.center.lat;
    document.getElementById('m_lng').value=s.lng||S.org.center.lng;
    document.getElementById('m_inspector').value=s.inspector||'';
    document.getElementById('m_serviced').value=id?String(s.serviced!==false):String(true);
    buildInspectorSelect();
    if(id) document.getElementById('m_inspector').value=s.inspector||'';
    openModal('schModal');
  }
  document.getElementById('saveSch').addEventListener('click',()=>{
    const name=document.getElementById('m_name').value.trim();
    if(!name){toast('Введіть назву закладу','red');return;}
    const data={
      name, address:document.getElementById('m_address').value.trim(),
      type:document.getElementById('m_type').value.trim(), city:document.getElementById('m_city').value.trim(),
      director:document.getElementById('m_director').value.trim(), phone:document.getElementById('m_phone').value.trim(),
      email:document.getElementById('m_email').value.trim(), website:document.getElementById('m_website').value.trim(),
      lat:+document.getElementById('m_lat').value||S.org.center.lat, lng:+document.getElementById('m_lng').value||S.org.center.lng,
      inspector:document.getElementById('m_inspector').value||null,
      serviced:document.getElementById('m_serviced').value==='true',
      students:+document.getElementById('m_students').value||0,
    };
    if(editingId){window.SOBStore.updateSchool(editingId,data);toast('Заклад оновлено');}
    else{window.SOBStore.addSchool({...data,events:0,prevention:0,participants:0,consultations:0,rating:0,students:0});toast('Заклад додано');}
    window.closeModal('schModal'); shell();
  });

  /* ── CSV / JSON export ── */
  function csvRow(arr){ return arr.map(v=>'"'+(String(v||'').replace(/"/g,'""'))+'"').join(',')+'\r\n'; }
  function downloadCSV(filename,rows){
    const bom='﻿'; // BOM для коректного відображення кирилиці в Excel
    const blob=new Blob([bom+rows.join('')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  }

  window.exportCSV=function(type){
    const date=new Date().toISOString().slice(0,10);
    if(type==='events'){
      const rows=[csvRow(['Заклад','Місто','Дата','Тип заходу','Назва','Аудиторія','Учасники','Примітка'])];
      S.schoolEvents.forEach(ev=>{
        const sch=S.schools.find(x=>x.id===ev.schoolId);
        const typeLbl=(S.eventTypes||[]).find(t=>t.id===ev.type)?.label||ev.type||'';
        rows.push(csvRow([sch?.name||ev.schoolId, sch?.city||'', ev.date||'', typeLbl, ev.title||'', ev.audience||'', ev.participants||0, ev.note||'']));
      });
      downloadCSV(`sob-заходи-${date}.csv`,rows);
    } else if(type==='schools'){
      const rows=[csvRow(['Назва','Тип','Місто','Адреса','Директор','Телефон','Email','Працівник СОБ','Заходів','Учасників','Консультацій','Рейтинг','Обслуговується'])];
      S.schools.filter(s=>s.serviced).forEach(s=>{
        rows.push(csvRow([s.name,s.type||'',s.city||'',s.address||'',s.director||'',s.phone||'',s.email||'',S.inspectors[s.inspector]?.name||'',s.events||0,s.participants||0,s.consultations||0,s.rating||0,'Так']));
      });
      downloadCSV(`sob-заклади-${date}.csv`,rows);
    } else if(type==='stats'){
      const byType={};
      (S.eventTypes||[]).forEach(t=>{byType[t.id]={label:t.label,count:0,participants:0};});
      (S.schoolEvents||[]).forEach(ev=>{if(byType[ev.type]){byType[ev.type].count++;byType[ev.type].participants+=(ev.participants||0);}});
      const rows=[csvRow(['Напрямок','Заходів','Учасників'])];
      Object.values(byType).forEach(t=>rows.push(csvRow([t.label,t.count,t.participants])));
      downloadCSV(`sob-статистика-${date}.csv`,rows);
    } else if(type==='inspectors'){
      const rows=[csvRow(['ПІБ','Звання','Посада','Підрозділ','Службовий тел.','Мобільний тел.','Email','Telegram','Закладів','Примітка'])];
      Object.entries(S.inspectors).forEach(([k,ins])=>{
        const cnt=S.schools.filter(s=>s.serviced&&s.inspector===k).length;
        rows.push(csvRow([ins.name,ins.rankTitle||'',ins.position||ins.rank||'',ins.department||'',ins.phone||'',ins.phone2||'',ins.email||'',ins.telegram||'',cnt,ins.note||'']));
      });
      downloadCSV(`sob-працівники-${date}.csv`,rows);
    }
    toast('Файл завантажується…');
  };

  function exportJSON(){
    const out={}; ['schools','schoolEvents','gallery','files','inspectors','org'].forEach(k=>out[k]=S[k]);
    const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`sob-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    toast('Резервну копію завантажено');
  }
  window.exportJSON=exportJSON;

  document.getElementById('importInput').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        ['schools','schoolEvents','gallery','files','inspectors','org'].forEach(k=>{if(d[k])S[k]=d[k];});
        window.SOBStore.save(); toast('Дані імпортовано'); shell();
      }catch(err){toast('Помилка файлу','red');}
    };
    r.readAsText(f); e.target.value='';
  });

  document.querySelectorAll('.modal-scrim').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');}));
  document.addEventListener('sob:synced', ()=>renderTab());
  shell();
}
</script>
</body>
</html>

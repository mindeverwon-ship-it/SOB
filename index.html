<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>СОБ · Огляд — Цифрова карта безпеки</title>
<link rel="stylesheet" href="css/styles.css">
<style>
/* ══ HERO ══ */
.hero {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--navy-800) 0%, var(--navy-950) 100%);
  border-radius: var(--radius-xl); color: #fff;
  padding: 44px 44px 40px; box-shadow: var(--shadow-navy);
}
.hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(520px 340px at 95% -5%,  rgba(46,107,240,.38), transparent 60%),
    radial-gradient(340px 280px at 80% 120%, rgba(255,196,46,.13), transparent 60%),
    radial-gradient(200px 200px at 10% 90%,  rgba(31,89,221,.18),  transparent 70%);
}
.hero::after {
  content:''; position:absolute; right:-40px; top:-30px;
  width:300px; height:300px;
  background: url('assets/sob-emblem.png') center/contain no-repeat;
  opacity:.06; pointer-events:none;
}
.hero-grid { position:relative; z-index:1; display:grid; grid-template-columns:1fr auto; gap:36px; align-items:center; }

/* badges */
.hero .badge-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.hero .hbadge {
  font-size:11.5px; font-weight:600; padding:5px 13px; border-radius:20px;
  background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14);
  display:inline-flex; gap:6px; align-items:center; backdrop-filter:blur(4px);
}
.hero .hbadge .yd { width:7px; height:7px; border-radius:50%; background:var(--gold-500); }

/* title */
.hero h1 { font-size:34px; font-weight:800; letter-spacing:-.025em; line-height:1.1; max-width:600px; }
.hero p { color:rgba(255,255,255,.62); margin-top:14px; font-size:15.5px; max-width:520px; line-height:1.6; }
.hero .cta { display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; }

/* ── Report panel ── */
.report-panel {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.13);
  border-radius:var(--radius-lg); padding:22px; width:300px; backdrop-filter:blur(8px);
  flex-shrink:0;
}
.report-panel .rp-top { display:flex; align-items:center; gap:11px; margin-bottom:16px; }
.report-panel .rp-ic { width:40px; height:40px; border-radius:12px; background:var(--gold-500); color:var(--navy-900); display:grid; place-items:center; flex-shrink:0; }
.report-panel .rp-ic svg { width:20px; height:20px; }
.report-panel .rp-t b { font-size:14px; display:block; }
.report-panel .rp-t span { font-size:12px; color:rgba(255,255,255,.5); }
.rp-btn {
  display:flex; align-items:center; gap:9px; padding:11px 14px; border-radius:11px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.10);
  font-size:13.5px; font-weight:500; color:#fff;
  transition:background .15s, transform .15s; width:100%; text-align:left; margin-top:8px;
}
.rp-btn:first-of-type { margin-top:0; }
.rp-btn:hover { background:rgba(255,255,255,.17); transform:translateX(2px); }
.rp-btn svg { width:16px; height:16px; color:var(--gold-400); flex-shrink:0; }
.rp-btn.gold { background:var(--gold-500); color:var(--navy-900); border-color:transparent; }
.rp-btn.gold svg { color:var(--navy-900); }
.rp-btn.gold:hover { background:var(--gold-400); }

/* ── Quick actions strip ── */
.quick-actions { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:22px; }
.qa-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px; display:flex; flex-direction:column; gap:12px;
  box-shadow:var(--shadow-sm); cursor:pointer; text-decoration:none; color:inherit;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s;
}
.qa-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); border-color:var(--blue-200); }
.qa-card .qa-ic { width:46px; height:46px; border-radius:14px; display:grid; place-items:center; }
.qa-card .qa-ic svg { width:22px; height:22px; }
.qa-card .qa-label { font-size:14px; font-weight:700; }
.qa-card .qa-sub { font-size:12.5px; color:var(--muted); margin-top:2px; }
.qa-card .qa-arr { margin-top:auto; color:var(--muted-2); }
.qa-card .qa-arr svg { width:16px; height:16px; }

/* ── Secondary stats strip ── */
.sec-strip { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; }
.sec-cell {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; box-shadow:var(--shadow-xs);
  transition:transform .18s var(--ease);
}
.sec-cell:hover { transform:translateY(-2px); }
.sec-cell .v { font-size:22px; font-weight:800; letter-spacing:-.02em; color:var(--blue-600); }
.sec-cell .l { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; }

/* ── Charts ── */
.chart-wrap { position:relative; height:260px; }
.doughnut-wrap { position:relative; height:210px; }
.legend { display:flex; flex-direction:column; gap:10px; }
.legend-item { display:flex; align-items:center; gap:10px; font-size:13.5px; }
.legend-item .sw { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.legend-item b { margin-left:auto; font-variant-numeric:tabular-nums; }

/* ── Ranking table ── */
.rtable { width:100%; border-collapse:collapse; }
.rtable th { text-align:left; font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); font-weight:700; padding:0 14px 13px; }
.rtable td { padding:13px 14px; border-top:1px solid var(--border); font-size:14px; }
.rtable tr:hover td { background:var(--surface-2); }
.rtable .rk { width:36px; height:36px; border-radius:10px; display:grid; place-items:center; font-weight:800; font-size:14px; background:var(--surface-3); color:var(--text-2); }
.rtable .rk.g1 { background:var(--gold-100); color:var(--gold-700); }
.rtable .rk.g2 { background:#E7ECF4; color:var(--navy-700); }
.rtable .rk.g3 { background:var(--amber-100); color:var(--amber-500); }
.rtable .sname { font-weight:600; }
.rtable .stype { font-size:12px; color:var(--muted); }
.bar-mini { height:6px; border-radius:4px; background:var(--surface-3); overflow:hidden; width:100px; }
.bar-mini > i { display:block; height:100%; background:linear-gradient(90deg,var(--blue-500),var(--blue-600)); border-radius:4px; transition:width .6s var(--ease); }

/* ── Responsive ── */
@media (max-width:1200px) { .quick-actions { grid-template-columns:repeat(2,1fr); } }
@media (max-width:1100px) { .sec-strip { grid-template-columns:repeat(3,1fr); } }
@media (max-width:900px)  { .hero-grid { grid-template-columns:1fr; } .report-panel { width:100%; } }
@media (max-width:640px)  {
  .hero { padding:28px 22px; }
  .hero h1 { font-size:24px; }
  .quick-actions { grid-template-columns:repeat(2,1fr); gap:10px; }
  .sec-strip { grid-template-columns:repeat(2,1fr); }
}
@media (max-width:420px)  { .quick-actions { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app" id="shell"></div>

<script src="js/data.js?v=14"></script>
<script src="js/store.js?v=17"></script>
<script src="js/shell.js?v=5"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" crossorigin="anonymous"></script>
<script>
document.body.classList.add('js-anim');
SOBShell.render({ active: 'dashboard', crumb: ['СОБ', 'Огляд'] });
const S = window.SOB, F = window.fmt, I = window.ICON;
const U = window.SOBAuth.current();
const canEdit = window.SOBAuth.canEdit();

/* KPI — сукупно: Excel-база + платформні заходи */
const now = new Date();
const thisMonth = (ev) => { if(!ev.date) return false; const d=new Date(ev.date); return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); };
const prevTypes = ['prevention','mine','evacuation','cyber','buling','legal'];
const eventsThisMonth = (S.schoolEvents||[]).filter(thisMonth);
const allPlatformEvs = (S.schoolEvents||[]).filter(e=>e.status!=='cancelled');
/* calcTotalStats підсумовує s.events по школах (base+journal після recalcSchool) */
const liveStats = window.calcTotalStats ? window.calcTotalStats() : {};
const kpiValues = {
  events:       liveStats.events       ?? S.kpis.find(k=>k.id==='events')?.value       ?? 0,
  prevention:   liveStats.prevention   ?? S.kpis.find(k=>k.id==='prevention')?.value   ?? 0,
  participants: liveStats.participations?? S.kpis.find(k=>k.id==='participants')?.value ?? 0,
  schools:      (S.schools||[]).filter(s=>s.serviced!==false).length,
};
const kpiThisMonth = eventsThisMonth.length;
const kpiHtml = S.kpis.map((k, i) => {
  const val = kpiValues[k.id] ?? k.value;
  const sub = k.id==='events'&&kpiThisMonth>0 ? `+${kpiThisMonth} цього місяця` : 'накопичено';
  return `<div class="kpi anim anim-${i+1}"><div class="ic ${k.color}">${I[k.icon] || I.grid}</div><span class="delta flat">${sub}</span><div class="val tnum" data-kpi="${k.id}">${F(val)}</div><div class="lbl">${k.label}</div></div>`;
}).join('');

const ranked = [...S.schools].filter(s=>s.serviced!==false).sort((a,b) => b.rating - a.rating).slice(0, 6);
const maxPart = Math.max(1, ...ranked.map(s => s.participants));
const ratingRows = ranked.map((s, i) => `
  <tr style="cursor:pointer" onclick="location.href='school.html?id=${s.id}'">
    <td><div class="rk ${i<3?'g'+(i+1):''}">${i+1}</div></td>
    <td><div class="sname">${s.name}</div><div class="stype">${s.type} · ${s.address.split(',').slice(-1)[0].trim()}</div></td>
    <td class="tnum">${s.events}</td>
    <td class="tnum">${F(s.participants)}</td>
    <td><div class="bar-mini"><i style="width:${Math.round(s.participants/maxPart*100)}%"></i></div></td>
    <td><span class="tag ${i===0?'gold':'blue'}">${s.rating}</span></td>
  </tr>`).join('');

/* легенда будується після розрахунку в блоці Chart нижче, тут placeholder */
const legend = `<div id="chartLegend" style="display:flex;flex-direction:column;gap:8px"></div>`;

/* role-aware quick action */
const quickAction = canEdit
  ? `<a class="btn btn-gold" href="${U.role==='admin'?'admin.html':'cabinet.html'}">${I.upload} ${U.role==='admin'?'Адмін-панель':'Мій кабінет'}</a>`
  : `<a class="btn btn-gold" href="#report">${I.doc} Сформувати звіт</a>`;

const totalStudents = S.schools.filter(s=>s.serviced!==false).reduce((a,s)=>a+(s.students||0),0);
const incidentsThisMonth = (S.incidents||[]).filter(thisMonth).length;

document.getElementById('content').innerHTML = `

  <!-- ══ HERO ══ -->
  <section class="hero anim anim-1">
    <div class="hero-grid">
      <div>
        <div class="badge-row">
          <span class="hbadge"><span class="yd"></span>${S.org.region}</span>
          <span class="hbadge">${S.org.period}</span>
          <span class="hbadge">Національна поліція України</span>
        </div>
        <h1>Цифрова карта безпеки та паспорт роботи Служби освітньої безпеки</h1>
        <p>Єдиний цифровий портал обліку заходів, статистики та взаємодії із закладами освіти ${S.org.districtGenitive||S.org.district}.</p>
        <div class="cta">
          ${quickAction}
          <a class="btn" style="background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.18)" href="map.html">${I.map} Карта закладів</a>
          <a class="btn" style="background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12)" href="analytics.html">${I.chart} Аналітика</a>
        </div>
      </div>
      <div class="report-panel anim anim-2" id="report">
        <div class="rp-top">
          <div class="rp-ic">${I.doc}</div>
          <div class="rp-t"><b>Звіт за період</b><span id="rpPeriodLabel">${(window.SOBDate&&window.SOBDate.currentLabel)||S.org.period}</span></div>
        </div>
        <label for="rpPeriod" style="font-size:12px;color:rgba(255,255,255,.6);font-weight:600;display:block;margin-bottom:6px">Період звіту</label>
        <select id="rpPeriod" onchange="window.rpPeriod=this.value;const o=this.options[this.selectedIndex];const l=document.getElementById('rpPeriodLabel');if(l)l.textContent=o.text;"
          style="width:100%;padding:10px 12px;margin-bottom:14px;border-radius:11px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#fff;font-size:14px;font-weight:600;cursor:pointer">
          ${(window.SOBDate?.presets||[]).filter(p=>!p.custom).map(p=>{const lbl=p.id==='month'?window.SOBDate.currentLabel:p.id==='prevmonth'?window.SOBDate.prevLabel:p.label;return `<option value="${p.id}" ${p.id==='month'?'selected':''}>${lbl}</option>`;}).join('')}
        </select>
        <button class="rp-btn gold" onclick="exportReport('PowerPoint')">${I.download} Завантажити презентацію (.pptx)</button>
      </div>
    </div>
  </section>

  <!-- ══ QUICK ACTIONS ══ -->
  <div class="quick-actions" style="margin-top:22px">
    <a class="qa-card anim anim-1" href="schools.html">
      <div class="qa-ic" style="background:var(--blue-100);color:var(--blue-600)">${I.school}</div>
      <div><div class="qa-label">Заклади освіти</div><div class="qa-sub">${S.schools.filter(s=>s.serviced!==false).length} під наглядом СОБ</div></div>
    </a>
    <a class="qa-card anim anim-2" href="incidents.html">
      <div class="qa-ic" style="background:var(--red-100);color:var(--red-500)">${I.alert}</div>
      <div><div class="qa-label">Інциденти</div><div class="qa-sub">${incidentsThisMonth} цього місяця</div></div>
    </a>
    <a class="qa-card anim anim-3" href="assignments.html">
      <div class="qa-ic" style="background:var(--amber-100);color:var(--amber-500)">${I.doc}</div>
      <div><div class="qa-label">Доручення</div><div class="qa-sub">${(S.assignments||[]).filter(a=>a.status==='active').length} активних</div></div>
    </a>
    <a class="qa-card anim anim-4" href="gallery.html">
      <div class="qa-ic" style="background:var(--green-100);color:var(--green-500)">${I.image||I.grid}</div>
      <div><div class="qa-label">Фотогалерея</div><div class="qa-sub">${(S.gallery||[]).length} фото</div></div>
    </a>
  </div>

  <!-- ══ KPI ══ -->
  <div style="margin-top:28px" class="row between wrap anim anim-2">
    <div class="section-title">${I.grid} Ключові показники місяця</div>
    <span class="muted" style="font-size:13px">Оновлено: ${new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'})}</span>
  </div>
  <div class="kpi-grid" style="margin-top:16px">${kpiHtml}</div>

  <!-- ══ SECONDARY STATS ══ -->
  <div style="margin-top:22px" class="row between wrap anim anim-3">
    <div class="section-title">${I.chart} Деталізація показників</div>
    <a class="btn btn-ghost btn-sm" href="analytics.html">${I.chart} Повна аналітика</a>
  </div>
  <div class="sec-strip anim anim-3" style="margin-top:14px">
    ${S.secondary.map(x => `<div class="sec-cell"><div class="v tnum">${F(x.value)}</div><div class="l">${x.label}</div></div>`).join('')}
  </div>

  <!-- ══ CHARTS ══ -->
  <div id="analytics" style="margin-top:24px" class="grid-2">
    <div class="card card-pad anim anim-4">
      <div class="card-head">
        <div class="section-title">${I.chart} Динаміка заходів</div>
        <span class="tag blue">5 місяців</span>
      </div>
      <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
    </div>
    <div class="card card-pad anim anim-4">
      <div class="card-head">
        <div class="section-title">${I.filter} Структура заходів</div>
        <span class="muted" style="font-size:13px">${S.schoolEvents.length} всього</span>
      </div>
      <div style="display:grid;grid-template-columns:200px 1fr;gap:22px;align-items:center">
        <div class="doughnut-wrap"><canvas id="doughnutChart"></canvas></div>
        <div class="legend">${legend}</div>
      </div>
    </div>
  </div>

  <!-- ══ AUDIENCE + RATING ══ -->
  <div style="margin-top:20px" class="grid-2">
    <div class="card card-pad anim anim-5">
      <div class="card-head">
        <div class="section-title">${I.users} Охоплені учні по місяцях</div>
        <span class="tag green">${F(eventsThisMonth.reduce((s,e)=>s+(e.participants||0),0))} цього місяця</span>
      </div>
      <div class="chart-wrap" style="height:220px"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card card-pad anim anim-5" id="rating">
      <div class="card-head">
        <div class="section-title">${I.trophy} Рейтинг активності</div>
        <span class="muted" style="font-size:13px">${S.org.period}</span>
      </div>
      <table class="rtable">
        <thead><tr><th></th><th>Заклад освіти</th><th>Заходи</th><th>Учасники</th><th>Охоплення</th><th>Рейтинг</th></tr></thead>
        <tbody>${ratingRows}</tbody>
      </table>
      <div class="divider"></div>
      <div style="text-align:center"><a class="btn btn-ghost btn-sm" href="map.html">Усі заклади на карті ${I.chevron}</a></div>
    </div>
  </div>

  <!-- ══ STUDENTS HIGHLIGHT ══ -->
  <div class="card anim anim-6" style="margin-top:20px;padding:26px 28px;background:linear-gradient(135deg,var(--navy-800),var(--navy-950));color:#fff;border:none">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px">
      <div>
        <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:8px">Загальний контингент</div>
        <div style="font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1">${totalStudents > 0 ? F(totalStudents) : '—'}</div>
        <div style="color:rgba(255,255,255,.55);font-size:15px;margin-top:6px">дітей у закладах під наглядом СОБ</div>
      </div>
      <div style="display:flex;gap:32px;flex-wrap:wrap">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:var(--gold-500)">${S.schools.filter(s=>s.serviced!==false).length}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">закладів СОБ</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:var(--gold-500)">${Object.keys(S.workers||{}).length}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">працівників СОБ</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:var(--gold-500)">${S.schoolEvents.length}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">заходів всього</div>
        </div>
      </div>
    </div>
  </div>
`;

Chart.defaults.font.family = 'Onest, sans-serif';
Chart.defaults.font.size = 12.5;
Chart.defaults.color = '#6A7A98';
Chart.defaults.animation = false;
const _charts = [];

/* ── Авторозрахунок даних графіків ── */
(function(){
  const evs = S.schoolEvents || [];
  /* Динаміка — пріоритет: агреговані дані з Excel (charts.eventsByMonth),
     якщо є платформні заходи — рахуємо з журналу, інакше — статичні дані */
  const eb = S.charts?.eventsByMonth || {};
  let lineLabels, lineEvents, lineParts;
  if (evs.length > 0) {
    const mn = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    const d = new Date();
    const months5 = [];
    for(let i=4; i>=0; i--){
      const dt = new Date(d.getFullYear(), d.getMonth()-i, 1);
      months5.push({ key: `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`, label: mn[dt.getMonth()] });
    }
    lineLabels = months5.map(m=>m.label);
    lineEvents  = months5.map(m => evs.filter(e=>e.date&&e.date.startsWith(m.key)).length);
    lineParts   = months5.map(m => evs.filter(e=>e.date&&e.date.startsWith(m.key)).reduce((s,e)=>s+(e.participants||0),0));
  } else {
    lineLabels = eb.labels       || [];
    lineEvents  = eb.events       || [];
    lineParts   = eb.participants || [];
  }

  _charts.push(new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: lineLabels, datasets: [
      { label: 'Заходи', data: lineEvents, borderColor: '#1F59DD', backgroundColor: (ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,270);g.addColorStop(0,'rgba(31,89,221,.20)');g.addColorStop(1,'rgba(31,89,221,0)');return g;}, fill: true, tension: .4, borderWidth: 3, pointBackgroundColor: '#1F59DD', pointRadius: 4, pointHoverRadius: 6, yAxisID:'y' },
      { label: 'Охоплено учнів', data: lineParts, borderColor: '#1AA56C', backgroundColor: 'transparent', fill: false, tension: .4, borderWidth: 2.5, pointBackgroundColor: '#1AA56C', pointRadius: 4, pointHoverRadius: 6, borderDash:[5,3], yAxisID:'y1' },
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, padding: 18 } } }, scales: { y: { beginAtZero: true, grid: { color: '#EEF3FA' }, border: { display: false }, position:'left' }, y1: { beginAtZero: true, grid: { display: false }, border: { display: false }, position:'right' }, x: { grid: { display: false }, border: { display: false } } } }
  }));

  // Donut — розбивка за напрямками
  let dtLabels, dtValues, dtColors;
  if (evs.length > 0) {
    const byType = {};
    evs.forEach(e=>{ const k=e.type||'other'; byType[k]=(byType[k]||0)+1; });
    const typeColors = { prevention:'#1B4FD1', cyber:'#2C66E6', buling:'#FFC824', legal:'#1E9E6A', mine:'#E84545', evacuation:'#FF7A00', other:'#93A0B8' };
    const typeLabels = S.eventTypes ? Object.fromEntries((S.eventTypes||[]).map(t=>[t.id,t.label])) : {};
    dtLabels = Object.keys(byType).map(k=>typeLabels[k]||k);
    dtValues = Object.keys(byType).map(k=>byType[k]);
    dtColors = Object.keys(byType).map(k=>typeColors[k]||'#93A0B8');
  } else {
    /* використовуємо агреговані дані з 16 тематичних напрямків */
    const catStats = window.calcCategoryStats ? window.calcCategoryStats() : {};
    const topCats = (S.eventCategories||[]).map(c=>({label:c.short,color:c.color,count:catStats[c.id]||0}))
      .filter(c=>c.count>0).sort((a,b)=>b.count-a.count).slice(0,8);
    dtLabels = topCats.map(t=>t.label);
    dtValues = topCats.map(t=>t.count);
    dtColors = topCats.map(t=>t.color);
  }
  const legendEl = document.getElementById('chartLegend');
  if(legendEl){
    if(dtLabels.length){
      legendEl.innerHTML = dtLabels.map((l,i)=>`<div class="legend-item"><span class="sw" style="background:${dtColors[i]}"></span>${l}<b>${dtValues[i]}</b></div>`).join('');
    } else {
      legendEl.innerHTML = `<div style="color:var(--muted);font-size:13px">Немає даних</div>`;
    }
  }
  _charts.push(new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: { labels: dtLabels.length ? dtLabels : ['Немає даних'], datasets: [{ data: dtValues.length ? dtValues : [1], backgroundColor: dtColors.length ? dtColors : ['#EEF3FA'], borderWidth: 3, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '66%', plugins: { legend: { display: false } } }
  }));

  // Bar — охоплені учні по місяцях
  const barData = (eb.participants && eb.labels) ? eb.participants : lineParts;
  const barLabels = (eb.labels) ? eb.labels : lineLabels;
  _charts.push(new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: barLabels, datasets: [{ label:'Охоплено учнів', data: barData, backgroundColor: barLabels.map((_,i)=> i===barLabels.length-1 ? '#1AA56C' : '#1F59DD'), borderRadius: 9, maxBarThickness: 76 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#EEF3FA' }, border: { display: false } }, x: { grid: { display: false }, border: { display: false } } } }
  }));
})();

function paintCharts(){ _charts.forEach(c => { try { c.resize(); c.draw(); } catch(e){} }); }
requestAnimationFrame(paintCharts); setTimeout(paintCharts, 80);
document.addEventListener('visibilitychange', () => { if(!document.hidden) paintCharts(); });

function exportReport(kind){
  /* Єдиний формат експорту — PowerPoint-презентація */
  buildPptx();
}
window.exportReport = exportReport;

/* ════════════════════════════════════════════════════════════════
   PowerPoint-презентація роботи СОБ — сучасний картковий дизайн
   у брендингу служби (темно-синій + золото), дані беруться наживо.
   ════════════════════════════════════════════════════════════════ */
function buildPptx(){
  const pptx = new PptxGenJS();
  pptx.defineLayout({ name:'SOB', width:13.333, height:7.5 });
  pptx.layout = 'SOB';
  pptx.author  = 'Служба освітньої безпеки';
  pptx.company = 'СОБ · ' + S.org.district;
  pptx.subject = 'Звіт за ' + S.org.period;
  pptx.title   = 'Служба освітньої безпеки · ' + S.org.district;

  /* ── Палітра бренду ── */
  const NAVY='0E274D', NAVY2='07172E', GOLD='FFC42E', GOLDINK='B8860B', BLUE='1F59DD',
        CREAM='F4F1EA', WHITE='FFFFFF', INK='14233B', MUT='6A7A98',
        GREEN='1AA56C', BORDER='E4DCCD', CARDBD='E7ECF4', SOFT='EAF0FA';
  const EMBLEM='assets/sob-emblem-hi.png', LOGO='assets/sob-logo-hi.png';
  const today = new Date().toLocaleDateString('uk-UA');
  const W = 13.333;

  /* ── Обраний період (із селектора на головній; за замовч. — поточний місяць) ── */
  const period = window.rpPeriod
    || (document.getElementById('rpPeriod')?.value)
    || 'month';
  const ps = window.calcPeriodStats ? window.calcPeriodStats(period)
           : { serviced:(S.schools||[]).filter(s=>s.serviced), statMap:{}, catStats:{}, filteredJournal:[],
               periodLabel:S.org.period, events:0, prevention:0, participations:0, coveragePercent:0 };
  const periodLabel = ps.periodLabel || S.org.period;

  /* ── Живі дані за період ── */
  const serviced= ps.serviced;
  const evTotal = ps.events ?? 0;
  const coverage= ps.coveragePercent ?? 0;
  const evOf = s => (ps.statMap[s.id]?.events ?? 0);          /* заходи закладу за період */
  const covOf= s => (ps.statMap[s.id]?.coveragePercent ?? 0); /* охоплення закладу за період */
  const partOf=s => (ps.statMap[s.id]?.participants ?? 0);

  /* ── Загальний шаблон контент-слайда ── */
  function content(eyebrow, title){
    const s = pptx.addSlide();
    s.background = { color: CREAM };
    s.addShape(pptx.ShapeType.rect, { x:0, y:0, w:W, h:0.18, fill:{ color:NAVY } });
    s.addShape(pptx.ShapeType.rect, { x:0, y:0.18, w:W, h:0.03, fill:{ color:GOLD } });
    s.addImage({ path:EMBLEM, x:0.45, y:0.5, w:0.62, h:0.62 });
    s.addText((eyebrow||'').toUpperCase(), { x:1.25, y:0.5, w:9, h:0.3, fontSize:11, bold:true, color:GOLDINK, charSpacing:2, fontFace:'Arial' });
    s.addText(title||'', { x:1.25, y:0.74, w:11.6, h:0.6, fontSize:26, bold:true, color:NAVY, fontFace:'Arial' });
    s.addText(periodLabel, { x:9.4, y:0.52, w:3.45, h:0.4, align:'right', fontSize:12, bold:true, color:MUT, fontFace:'Arial' });
    s.addShape(pptx.ShapeType.rect, { x:0, y:7.18, w:W, h:0.32, fill:{ color:NAVY } });
    s.addText('Служба освітньої безпеки · ' + S.org.district, { x:0.45, y:7.18, w:8, h:0.32, valign:'middle', fontSize:9, color:'9FB0CE', fontFace:'Arial' });
    s.addText(today, { x:9, y:7.18, w:3.9, h:0.32, valign:'middle', align:'right', fontSize:9, color:'9FB0CE', fontFace:'Arial' });
    return s;
  }
  /* ── Картка-показник (як бейджі у прикладі) ── */
  function statCard(s, x, y, w, h, value, label, sub, accent){
    s.addShape(pptx.ShapeType.roundRect, { x, y, w, h, fill:{ color:WHITE }, line:{ color:CARDBD, width:1 }, rectRadius:0.12, shadow:{ type:'outer', color:'B9C2D6', blur:6, offset:2, angle:90, opacity:0.25 } });
    s.addShape(pptx.ShapeType.roundRect, { x:x+0.25, y:y+0.28, w:0.5, h:0.16, fill:{ color:accent }, rectRadius:0.08 });
    s.addText(String(value), { x:x+0.2, y:y+0.5, w:w-0.4, h:0.7, fontSize:34, bold:true, color:NAVY, fontFace:'Arial' });
    s.addText(label, { x:x+0.2, y:y+1.22, w:w-0.4, h:0.4, fontSize:12.5, bold:true, color:INK, fontFace:'Arial' });
    if(sub) s.addText(sub, { x:x+0.2, y:y+1.55, w:w-0.4, h:0.4, fontSize:10, color:MUT, fontFace:'Arial' });
  }
  /* ── Горизонтальна смуга-рейтинг ── */
  function bars(s, items, x, y, w, rowH, accent){
    const max = Math.max(1, ...items.map(i=>i.value));
    const labelW = 4.6, valW = 0.9, barW = w - labelW - valW;
    items.forEach((it,i)=>{
      const yy = y + i*rowH;
      s.addText(it.label, { x, y:yy, w:labelW-0.15, h:rowH-0.06, valign:'middle', fontSize:11, color:INK, fontFace:'Arial' });
      s.addShape(pptx.ShapeType.roundRect, { x:x+labelW, y:yy+0.07, w:barW, h:rowH-0.2, fill:{ color:'E8E1D3' }, rectRadius:0.06 });
      const fw = Math.max(0.08, barW * (it.value/max));
      s.addShape(pptx.ShapeType.roundRect, { x:x+labelW, y:yy+0.07, w:fw, h:rowH-0.2, fill:{ color: it.color||accent }, rectRadius:0.06 });
      s.addText(String(it.value), { x:x+labelW+barW+0.05, y:yy, w:valW, h:rowH-0.06, valign:'middle', align:'right', fontSize:12, bold:true, color:NAVY, fontFace:'Arial' });
    });
  }

  /* ════ Слайд 1 · Титул — світлий «офіційний документ» ════ */
  const t = pptx.addSlide();
  t.background = { color: CREAM };
  t.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:W, h:0.30, fill:{ color:NAVY } });
  t.addShape(pptx.ShapeType.rect, { x:0, y:0.30, w:W, h:0.05, fill:{ color:GOLD } });
  /* логотип (підготовлений під світлий фон) — по центру */
  t.addImage({ path:LOGO, x:(W-3.4)/2, y:0.95, w:3.4, h:2.03 });
  t.addText('ЗВІТ ПРО РОБОТУ', { x:0.5, y:3.35, w:W-1, h:0.4, align:'center', fontSize:14, bold:true, color:GOLDINK, charSpacing:4, fontFace:'Arial' });
  t.addText('Служба освітньої безпеки', { x:0.5, y:3.72, w:W-1, h:1, align:'center', fontSize:40, bold:true, color:NAVY, fontFace:'Arial' });
  t.addShape(pptx.ShapeType.rect, { x:(W-2.2)/2, y:4.72, w:2.2, h:0.045, fill:{ color:GOLD } });
  t.addText(S.org.district, { x:0.5, y:4.9, w:W-1, h:0.5, align:'center', fontSize:20, color:MUT, fontFace:'Arial' });
  t.addText('Звітний період: ' + periodLabel, { x:0.5, y:5.5, w:W-1, h:0.5, align:'center', fontSize:15, bold:true, color:INK, fontFace:'Arial' });
  /* нижня плашка */
  t.addShape(pptx.ShapeType.rect, { x:0, y:7.0, w:W, h:0.5, fill:{ color:NAVY } });
  t.addText('Національна поліція України', { x:0.45, y:7.0, w:7, h:0.5, valign:'middle', fontSize:10, color:'9FB0CE', fontFace:'Arial' });
  t.addText('Сформовано: ' + today, { x:6, y:7.0, w:6.9, h:0.5, valign:'middle', align:'right', fontSize:10, color:'9FB0CE', fontFace:'Arial' });

  /* ════ Слайд 2 · Ключові показники ════ */
  const s2 = content('Загальні підсумки', 'Ключові показники ефективності');
  const cards = [
    { v: evTotal,                       l:'Проведено заходів',   s:'за період',             a:BLUE  },
    { v: ps.prevention ?? 0,            l:'Профілактичні',       s:'відпрацювання',         a:NAVY  },
    { v: window.fmt(ps.participations ?? 0), l:'Охоплено учасників', s:'за період',         a:GOLD  },
    { v: serviced.length,               l:'Заклади освіти',      s:'на обслуговуванні',     a:GREEN },
    { v: coverage + '%',                l:'Охоплення учнів',     s:'від загальної к-сті',   a:BLUE  },
  ];
  const cw=2.3, gap=0.18, cx0=0.55, cy=2.05, ch=2.05;
  cards.forEach((c,i)=> statCard(s2, cx0 + i*(cw+gap), cy, cw, ch, c.v, c.l, c.s, c.a));
  s2.addText('Усі показники обчислюються автоматично на основі внесених заходів і повністю збігаються з модулем «Аналітика діяльності».',
    { x:0.55, y:4.55, w:12.2, h:0.5, fontSize:12, italic:true, color:MUT, fontFace:'Arial' });

  /* ════ Слайд 3 · Тематичні напрямки ════ */
  const catList = (S.eventCategories||[]).map(c=>({ label:c.short, value:ps.catStats[c.id]||0, color:(c.color||'1F59DD').replace('#','') }))
                    .filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  if (catList.length){
    const s3 = content('Розподіл діяльності', 'Заходи за тематичними напрямками');
    const top = catList.slice(0,11);
    bars(s3, top, 0.6, 1.75, 12.1, 0.46, BLUE);
  }

  /* ════ Слайд 4 · Рейтинг закладів ════ */
  const ranked2 = [...serviced].sort((a,b)=>evOf(b)-evOf(a));
  if (ranked2.length){
    const s4 = content('Заклади освіти', 'Рейтинг активності закладів');
    const rows = ranked2.map((s,i)=>{
      const cp = covOf(s);
      return [
        { text:String(i+1), options:{ bold:true, align:'center', color: i<3?GOLD.replace('#',''):MUT } },
        { text:s.name, options:{ color:INK } },
        { text:s.city||'', options:{ color:MUT } },
        { text:String(evOf(s)), options:{ align:'center', bold:true, color:NAVY } },
        { text:window.fmt(partOf(s)), options:{ align:'center', color:INK } },
        { text:cp+'%', options:{ align:'center', color: cp>=70?GREEN:cp>=40?'B8860B':'B91C1C' } },
      ];
    });
    const head = ['#','Заклад освіти','Населений пункт','Заходів','Охоплено','Охопл. %']
      .map((h,i)=>({ text:h, options:{ bold:true, fill:{color:NAVY}, color:WHITE, align:i>2?'center':(i===0?'center':'left'), valign:'middle' } }));
    s4.addTable([head, ...rows], {
      x:0.55, y:1.7, w:12.25, colW:[0.6,5.15,2.5,1.4,1.5,1.1],
      rowH:0.42, fontSize:11, fontFace:'Arial', valign:'middle',
      border:{ pt:0.5, color:BORDER }, fill:{ color:WHITE }, autoPage:true,
      alternateRowColor:'F3EFE6'
    });
  }

  /* ════ Слайд 5 · Райони / території ════ */
  const distMap = {};
  serviced.forEach(s=>{ const w=S.workers?.[s.inspector]; const k=(w&&w.district)||s.tg||'—'; distMap[k]=(distMap[k]||0)+evOf(s); });
  const distList = Object.entries(distMap).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  if (distList.length){
    const s5 = content('Територіальний розріз', 'Активність по районах / територіях');
    bars(s5, distList.slice(0,11), 0.6, 1.75, 12.1, 0.46, NAVY);
  }

  /* ════ Слайд 6 · Працівники СОБ ════ */
  const wMap = {};
  serviced.forEach(s=>{ if(s.inspector){ wMap[s.inspector]=(wMap[s.inspector]||0)+evOf(s); } });
  const wList = Object.entries(wMap).map(([k,value])=>({ label:(S.workers?.[k]?.name)||k, value })).sort((a,b)=>b.value-a.value);
  if (wList.length){
    const s6 = content('Персонал', 'Статистика по працівниках СОБ');
    bars(s6, wList.slice(0,11), 0.6, 1.75, 12.1, 0.46, GREEN);
  }

  /* ════ Слайд 7+ · Журнал заходів (за обраний період) ════ */
  if ((ps.filteredJournal||[]).length){
    const s7 = content('Деталізація', 'Журнал проведених заходів');
    const typeLabels = Object.fromEntries((S.eventTypes||[]).map(x=>[x.id,x.label]));
    const catLabels  = Object.fromEntries((S.eventCategories||[]).map(x=>[x.id,x.short]));
    const evs = [...(ps.filteredJournal||[])]
      .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,60);
    const head = ['Дата','Заклад','Напрямок','Назва заходу','Учасн.']
      .map((h,i)=>({ text:h, options:{ bold:true, fill:{color:NAVY}, color:WHITE, align:i===4?'center':'left', valign:'middle' } }));
    const rows = evs.map(e=>{
      const sc = S.schools.find(x=>x.id===e.schoolId);
      return [
        { text:e.date||'', options:{ color:MUT } },
        { text:sc?sc.name:'', options:{ color:INK } },
        { text:catLabels[e.category]||typeLabels[e.type]||e.type||'', options:{ color:INK } },
        { text:e.title||'', options:{ color:INK } },
        { text:String(e.participants||0), options:{ align:'center', bold:true, color:NAVY } },
      ];
    });
    s7.addTable([head, ...rows], {
      x:0.55, y:1.7, w:12.25, colW:[1.5,3.9,2.35,3.4,1.1],
      rowH:0.38, fontSize:10, fontFace:'Arial', valign:'middle',
      border:{ pt:0.5, color:BORDER }, fill:{ color:WHITE }, autoPage:true,
      alternateRowColor:'F3EFE6'
    });
  }

  /* ════ Слайд фінал · Подяка — світлий «офіційний документ» ════ */
  const fin = pptx.addSlide();
  fin.background = { color: CREAM };
  fin.addShape(pptx.ShapeType.rect, { x:0, y:0,    w:W, h:0.30, fill:{ color:NAVY } });
  fin.addShape(pptx.ShapeType.rect, { x:0, y:0.30, w:W, h:0.05, fill:{ color:GOLD } });
  fin.addImage({ path:EMBLEM, x:(W-1.5)/2, y:2.0, w:1.5, h:1.5 });
  fin.addText('Дякуємо за увагу', { x:0.5, y:3.75, w:12.3, h:0.7, align:'center', fontSize:32, bold:true, color:NAVY, fontFace:'Arial' });
  fin.addShape(pptx.ShapeType.rect, { x:(W-2.2)/2, y:4.62, w:2.2, h:0.045, fill:{ color:GOLD } });
  fin.addText('Служба освітньої безпеки · ' + S.org.district, { x:0.5, y:4.8, w:12.3, h:0.5, align:'center', fontSize:15, color:MUT, fontFace:'Arial' });
  fin.addShape(pptx.ShapeType.rect, { x:0, y:7.0, w:W, h:0.5, fill:{ color:NAVY } });
  fin.addText('Сформовано: ' + today, { x:0.45, y:7.0, w:12.4, h:0.5, valign:'middle', align:'center', fontSize:10, color:'9FB0CE', fontFace:'Arial' });

  const fname = `sob-презентація-${String(periodLabel).replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.pptx`;
  pptx.writeFile({ fileName: fname });
  toast('PowerPoint-презентацію завантажено ✓');
}
window.buildPptx = buildPptx;

/* Реактивне оновлення KPI та графіків при синхронізації з Firebase */
document.addEventListener('sob:synced', () => {
  /* Перезавантажити сторінку плавно: оновити KPI та графіки без reload */
  try {
    const liveStats = window.calcTotalStats ? window.calcTotalStats() : {};
    document.querySelectorAll('[data-kpi]').forEach(el => {
      const key = el.dataset.kpi;
      if (key === 'events'       && liveStats.events       != null) el.textContent = window.fmt(liveStats.events);
      if (key === 'participants' && liveStats.participations!= null) el.textContent = window.fmt(liveStats.participations);
      if (key === 'prevention'   && liveStats.prevention   != null) el.textContent = window.fmt(liveStats.prevention);
    });
  } catch(e) {}
});
</script>

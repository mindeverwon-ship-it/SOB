<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>СОБ · Детальний звіт</title>
<link rel="stylesheet" href="css/styles.css">
<style>
/* ── filter bar ── */
.rp-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
.rp-bar select { height:38px; padding:0 12px; border:1.5px solid var(--border); border-radius:10px; font-size:13.5px; background:var(--surface); color:var(--text); }
/* ── conclusion ── */
.rp-conclusion { background:linear-gradient(135deg,var(--navy-900,#0e274d),#1f59dd); color:#fff; border-radius:16px; padding:22px 24px; margin-bottom:20px; }
.rp-conclusion h3 { font-size:13px; font-weight:500; opacity:.65; margin:0 0 10px; }
.rp-conclusion p  { font-size:14px; line-height:1.75; margin:0 0 7px; }
.rp-conclusion p:last-child { margin:0; }
/* ── kpi row ── */
.rp-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:20px; }
.rp-kpi  { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
.rp-kpi .v { font-size:26px; font-weight:800; color:var(--blue-700,#1547b2); }
.rp-kpi .l { font-size:12px; color:var(--muted); margin-top:3px; }
/* ── analysis grid ── */
.rp-analysis-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
@media(max-width:780px){ .rp-analysis-row { grid-template-columns:1fr; } }
.rp-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px; }
.rp-panel h3 { font-size:13.5px; font-weight:700; margin:0 0 14px; }
/* ── bar rows ── */
.rp-br { display:flex; align-items:center; gap:9px; margin-bottom:8px; font-size:12.5px; }
.rp-br-lbl { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
.rp-br-wrap { flex:1; background:var(--surface-2,#f4f6fb); border-radius:4px; height:7px; }
.rp-br-fill { height:100%; border-radius:4px; background:var(--blue-500,#2366e8); }
.rp-br-v { min-width:22px; text-align:right; font-weight:700; font-size:12px; color:var(--blue-700,#1547b2); }
/* ── school accordion ── */
.rp-school { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden; }
.rp-sh-head { display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; transition:background .15s; }
.rp-sh-head:hover { background:var(--surface-2,#f4f6fb); }
.rp-sh-head .chev { margin-left:auto; font-size:11px; color:var(--muted); transition:transform .2s; }
.rp-sh-head.open .chev { transform:rotate(90deg); }
.rp-sh-body { padding:16px 18px; border-top:1px solid var(--border); display:none; }
/* ── event table ── */
.rp-etbl { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
.rp-etbl th { background:var(--surface-2,#f4f6fb); font-weight:600; padding:8px 10px; text-align:left; font-size:11.5px; color:var(--muted); border-bottom:1.5px solid var(--border); }
.rp-etbl td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.rp-etbl tr:last-child td { border-bottom:none; }
.rp-etbl tr:hover td { background:var(--surface-2,#f4f6fb); }
/* ── type tag ── */
.ttag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; background:var(--blue-050,#e8f0fe); color:var(--blue-700,#1547b2); }
/* ── event photos ── */
.rp-evphotos { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.rp-evphotos img { width:72px; height:54px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
/* ── problem ── */
.rp-prob-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
.rp-prob-item { background:#fff5f5; border:1.5px solid #fecaca; border-radius:10px; padding:12px 14px; }
.rp-prob-item .n { font-size:13px; font-weight:600; }
.rp-prob-item .r { font-size:12px; color:var(--muted); margin-top:2px; }
/* ── empty ── */
.rp-empty { text-align:center; color:var(--muted); padding:18px 0; font-size:13px; }
/* print */
@media print {
  .rp-bar, .sidebar, .topbar { display:none!important; }
  .rp-sh-body { display:block!important; }
  .rp-conclusion { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}
</style>
</head>
<body>
<div class="app" id="shell"></div>
<script src="js/data.js?v=10"></script>
<script src="js/store.js?v=13"></script>
<script src="js/shell.js?v=5"></script>
<script>
const S = window.SOB, F = window.fmt, I = window.ICON;
SOBShell.render({ active: 'report', crumb: ['СОБ', 'Звітність', 'Детальний звіт'] });

const MN_SHORT = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
const MN_FULL  = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

/* ── helpers ── */
const typeLabel = id => {
  const t = (S.eventTypes||[]).find(x=>x.id===id);
  return t ? (t.label||id) : (id||'—');
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = iso => { try{ const d=new Date(iso); return d.getDate()+' '+MN_SHORT[d.getMonth()]+' '+d.getFullYear(); }catch(e){ return iso||''; } };

const SD = window.SOBDate;

/* ── period selector HTML ── */
function buildPeriodOpts() {
  const presets = SD?.presets || [];
  return presets.map(p => {
    const lbl = p.id==='month' ? SD.currentLabel : p.id==='prevmonth' ? SD.prevLabel : p.label;
    return `<option value="${p.id}">${lbl}</option>`;
  }).join('');
}

let filterPeriod = 'month'; /* default = поточний місяць */
let filterSchool = 'all';

/* ── main data builder ── */
function buildData() {
  const serviced = (S.schools||[]).filter(s => s.serviced !== false);
  const allEvs   = (S.schoolEvents||[]).filter(e => e.status !== 'cancelled');
  const allGal   = (S.gallery||[]);

  /* apply period filter to journal events */
  const journalEvs = SD ? SD.filterEvents(allEvs, filterPeriod) : allEvs;

  /* apply school filter */
  const schools = filterSchool === 'all' ? serviced : serviced.filter(s => s.id === filterSchool);

  /* ── per-school rows ── */
  const rows = schools.map(sc => {
    const ins       = S.workers?.[sc.inspector] || {};
    const scEvs     = journalEvs.filter(e => e.schoolId === sc.id);
    /* if period filter → show only journal; "all" або відсутність фільтра → база+журнал */
    const noFilter  = !filterPeriod || filterPeriod === 'all';
    const baseE     = noFilter ? (sc.baseEvents       ?? sc.events       ?? 0) : 0;
    const baseP     = noFilter ? (sc.baseParticipants ?? sc.participants  ?? 0) : 0;
    const journalE  = scEvs.length;
    const journalP  = scEvs.reduce((s,e) => s+(e.participants||0), 0);
    const totalE    = baseE + journalE;
    const totalP    = baseP + journalP;
    const photos    = allGal.filter(g => g.schoolId === sc.id);
    /* type breakdown */
    const byType = {};
    scEvs.forEach(e => { byType[e.type] = (byType[e.type]||0)+1; });
    return { sc, ins, scEvs, baseE, baseP, journalE, journalP, totalE, totalP, photos, byType };
  }).sort((a,b) => b.totalE - a.totalE);

  /* ── totals ── */
  const totE    = rows.reduce((s,r) => s+r.totalE, 0);
  const totP    = rows.reduce((s,r) => s+r.totalP, 0);
  const totPh   = rows.reduce((s,r) => s+r.photos.length, 0);
  const totJEvs = journalEvs.filter(e => schools.some(s=>s.id===e.schoolId)).length;
  const active  = rows.filter(r => r.totalE>0).length;
  const inactive= rows.filter(r => r.totalE===0).length;

  /* ── theme counts ── */
  const themeMap = {};
  journalEvs.filter(e => schools.some(s=>s.id===e.schoolId)).forEach(e => {
    themeMap[e.type] = (themeMap[e.type]||0)+1;
  });
  const topThemes = Object.entries(themeMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  /* ── worker stats ── */
  const workerMap = {};
  journalEvs.filter(e => schools.some(s=>s.id===e.schoolId)).forEach(e => {
    const sc2 = schools.find(s=>s.id===e.schoolId);
    if (sc2?.inspector) workerMap[sc2.inspector] = (workerMap[sc2.inspector]||0)+1;
  });
  const topWorkers = Object.entries(workerMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  /* ── problem schools ── */
  const noFilter2 = !filterPeriod || filterPeriod === 'all';
  const problems = noFilter2
    ? rows.filter(r => r.totalE < 3)
    : rows.filter(r => r.journalE === 0);

  /* ── auto conclusion ── */
  const periodLabel = filterPeriod
    ? (SD ? SD.presetLabel(filterPeriod) : filterPeriod)
    : 'загальний період';
  const conclusion = makeConclusion({ rows, totE, totJEvs, totP, active, inactive, topThemes, topWorkers, totPh, periodLabel });

  return { rows, totE, totP, totPh, totJEvs, active, inactive, topThemes, topWorkers, problems, conclusion, periodLabel };
}

function makeConclusion({ rows, totE, totJEvs, totP, active, inactive, topThemes, topWorkers, totPh, periodLabel }) {
  const lines = [];
  if (totJEvs > 0 || totE > 0) {
    lines.push(`Протягом ${periodLabel} працівниками СОБ проведено ${totE} заходів у ${active} з ${rows.length} закладів освіти з охопленням ${F(totP)} учасників.`);
  } else {
    lines.push(`За ${periodLabel} журнальних записів про заходи не знайдено.`);
  }
  if (rows[0]?.totalE > 0) {
    const r = rows[0];
    lines.push(`Найбільшу активність показав заклад: ${r.sc.name} — ${r.totalE} заходів, відповідальний ${r.ins.name||'—'}.`);
  }
  if (topThemes.length) {
    const top3 = topThemes.slice(0,3).map(([t])=>typeLabel(t)).join(', ');
    lines.push(`Найпоширеніші тематики: ${top3}.`);
  }
  if (topWorkers.length) {
    const [k,cnt] = topWorkers[0];
    lines.push(`Найактивніший працівник СОБ: ${S.workers?.[k]?.name||k} — ${cnt} заходів у журналі.`);
  }
  if (inactive > 0) {
    lines.push(`${inactive} закладів не мають активності за вибраний період — рекомендується активізувати роботу.`);
  }
  if (totPh > 0) {
    lines.push(`У системі зберігається ${totPh} фотозвітів.`);
  }
  return lines;
}

/* ── render ── */
function render() {
  const d = buildData();
  const cont = document.getElementById('content');
  if (!cont) return;

  /* filter options */
  const schOpts = (S.schools||[]).filter(s=>s.serviced!==false)
    .map(s=>`<option value="${s.id}" ${filterSchool===s.id?'selected':''}>${esc(s.name)}</option>`).join('');

  /* KPI */
  const kpiHtml = [
    { v: d.totE,     l: 'Заходів (всього)' },
    { v: d.totJEvs,  l: 'Заходів (журнал)' },
    { v: F(d.totP),  l: 'Учасників' },
    { v: d.totPh,    l: 'Фотозвітів' },
    { v: d.active,   l: 'Активних закладів' },
    { v: d.inactive, l: 'Без активності' },
  ].map(k=>`<div class="rp-kpi"><div class="v tnum">${k.v}</div><div class="l">${k.l}</div></div>`).join('');

  /* themes bar */
  const maxT = d.topThemes[0]?.[1]||1;
  const themesHtml = d.topThemes.length
    ? d.topThemes.map(([t,cnt])=>`<div class="rp-br">
        <div class="rp-br-lbl" title="${esc(typeLabel(t))}">${esc(typeLabel(t))}</div>
        <div class="rp-br-wrap"><div class="rp-br-fill" style="width:${Math.round(cnt/maxT*100)}%"></div></div>
        <div class="rp-br-v">${cnt}</div>
      </div>`).join('')
    : `<div class="rp-empty">Заходів у журналі немає</div>`;

  /* workers bar */
  const maxW = d.topWorkers[0]?.[1]||1;
  const workersHtml = d.topWorkers.length
    ? d.topWorkers.map(([k,cnt])=>`<div class="rp-br">
        <div class="rp-br-lbl" title="${esc(S.workers?.[k]?.name||k)}">${esc((S.workers?.[k]?.name||k).split(' ').slice(0,2).join(' '))}</div>
        <div class="rp-br-wrap"><div class="rp-br-fill" style="width:${Math.round(cnt/maxW*100)}%;background:var(--green-500,#1aa56c)"></div></div>
        <div class="rp-br-v" style="color:var(--green-600,#0e7e53)">${cnt}</div>
      </div>`).join('')
    : `<div class="rp-empty">Немає даних</div>`;

  /* problem schools */
  const probHtml = d.problems.length
    ? `<div class="rp-prob-grid">${d.problems.map(r=>`<div class="rp-prob-item">
        <div class="n">${esc(r.sc.name)}</div>
        <div class="r">${esc(r.sc.city||'')} · ${esc(r.ins.name||'—')} · ${r.totalE} заходів</div>
      </div>`).join('')}</div>`
    : `<div style="color:var(--green-600,#0e7e53);font-weight:600;padding:6px 0">✓ Всі заклади мають активність</div>`;

  /* school accordion cards */
  const schoolCards = d.rows.map(r => {
    const { sc, ins, scEvs, baseE, baseP, totalE, totalP, photos, byType } = r;
    /* event rows */
    const evRows = [...scEvs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(e => {
      /* photos attached to this event */
      const evPhotos = photos.filter(g => g.eventId === e.id);
      const photosHtml = evPhotos.length
        ? `<div class="rp-evphotos">${evPhotos.map(g=>`<img src="${g.url||g.dataUrl||''}" alt="фото" loading="lazy">`).join('')}</div>`
        : '';
      return `<tr>
        <td style="white-space:nowrap;color:var(--muted)">${fmtDate(e.date)}</td>
        <td><b>${esc(e.title||'Без назви')}</b>${photosHtml}</td>
        <td><span class="ttag">${esc(typeLabel(e.type))}</span></td>
        <td class="tnum">${e.participants||0}</td>
      </tr>`;
    }).join('');
    /* top types for this school */
    const topType = Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,3)
      .map(([t,c])=>`<span class="ttag" style="margin-right:4px">${esc(typeLabel(t))} ×${c}</span>`).join('');

    return `<div class="rp-school">
      <div class="rp-sh-head" onclick="toggleCard(this)">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;margin-bottom:2px">${esc(sc.name)}</div>
          <div style="font-size:12px;color:var(--muted)">${esc(ins.name||'—')} · ${esc(sc.city||'')}${sc.tg?' · '+esc(sc.tg):''}</div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-shrink:0;margin-left:12px">
          <span style="font-size:14px;font-weight:800;color:var(--blue-700,#1547b2)">${totalE}</span>
          <span style="font-size:12px;color:var(--muted)">${F(totalP)} учасн.</span>
          ${photos.length ? `<span style="font-size:12px;color:var(--muted)">📷 ${photos.length}</span>` : ''}
          <span class="chev">▶</span>
        </div>
      </div>
      <div class="rp-sh-body">
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">
          ${baseE ? `<div style="text-align:center"><div style="font-size:20px;font-weight:800">${baseE}</div><div style="font-size:11px;color:var(--muted)">Excel-база</div></div>` : ''}
          <div style="text-align:center"><div style="font-size:20px;font-weight:800">${scEvs.length}</div><div style="font-size:11px;color:var(--muted)">Журнал</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--blue-700,#1547b2)">${totalE}</div><div style="font-size:11px;color:var(--muted)">Всього</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:800">${F(totalP)}</div><div style="font-size:11px;color:var(--muted)">Учасників</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:800">${photos.length}</div><div style="font-size:11px;color:var(--muted)">Фото</div></div>
          <div style="text-align:center"><div style="font-size:20px;font-weight:800">${sc.students||0}</div><div style="font-size:11px;color:var(--muted)">Учнів</div></div>
        </div>
        ${topType ? `<div style="margin-bottom:12px">${topType}</div>` : ''}
        ${scEvs.length ? `<table class="rp-etbl">
          <thead><tr><th>Дата</th><th>Захід / Фото</th><th>Тематика</th><th>Учасн.</th></tr></thead>
          <tbody>${evRows}</tbody>
        </table>` : `<div class="rp-empty">Журнальних записів за обраний період немає${baseE?` (з Excel-бази: ${baseE} заходів)`:''}</div>`}
        ${photos.length && !scEvs.length ? `<div class="rp-evphotos" style="margin-top:10px">${photos.slice(0,8).map(g=>`<img src="${g.url||g.dataUrl||''}" loading="lazy">`).join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  /* ── assemble page ── */
  cont.innerHTML = `
    <div class="page-head">
      <div>
        <h1 class="page-title">Детальний звіт</h1>
        <div class="page-sub">Повна деталізація по закладах · ${esc(d.periodLabel)}</div>
      </div>
      <div class="row gap-8">
        <button class="btn btn-ghost" onclick="window.print()">🖨 Друк</button>
        <button class="btn btn-primary" onclick="expandAll()">Розгорнути всі ▼</button>
      </div>
    </div>

    <div class="rp-bar">
      <label style="font-size:13px;color:var(--muted);font-weight:600">Період:</label>
      <select id="rp-period">${buildPeriodOpts().replace(`value="${filterPeriod}"`,`value="${filterPeriod}" selected`)}</select>
      <label style="font-size:13px;color:var(--muted);font-weight:600">Заклад:</label>
      <select id="rp-school"><option value="all">Всі заклади</option>${schOpts}</select>
    </div>

    <div class="rp-conclusion">
      <h3>📋 Автоматичний підсумок · ${esc(d.periodLabel)}</h3>
      ${d.conclusion.map(l=>`<p>${esc(l)}</p>`).join('')}
    </div>

    <div class="rp-kpis">${kpiHtml}</div>

    <div class="rp-analysis-row">
      <div class="rp-panel">
        <h3>📊 Топ тематик (журнал)</h3>
        ${themesHtml}
      </div>
      <div class="rp-panel">
        <h3>👥 Топ працівників СОБ (журнал)</h3>
        ${workersHtml}
      </div>
    </div>

    <div class="rp-panel" style="margin-bottom:20px">
      <h3>⚠️ ${filterPeriod?'Заклади без записів у журналі':'Заклади з менше 3 заходів'}</h3>
      ${probHtml}
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="section-title">🏫 Деталізація по закладах</div>
      <span style="font-size:12px;color:var(--muted)">${d.rows.length} закладів</span>
    </div>
    ${schoolCards||'<div class="rp-panel" style="text-align:center;color:var(--muted);padding:32px">Заклади не знайдено</div>'}
  `;

  /* bind filters */
  document.getElementById('rp-period').value = filterPeriod;
  document.getElementById('rp-period').addEventListener('change', e=>{ filterPeriod=e.target.value; render(); });
  document.getElementById('rp-school').addEventListener('change', e=>{ filterSchool=e.target.value; render(); });
}

function toggleCard(head) {
  const body = head.nextElementSibling;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  head.classList.toggle('open', !isOpen);
}
window.toggleCard = toggleCard;

function expandAll() {
  document.querySelectorAll('.rp-sh-body').forEach(b=>{ b.style.display='block'; });
  document.querySelectorAll('.rp-sh-head').forEach(h=>h.classList.add('open'));
}
window.expandAll = expandAll;

document.addEventListener('sob:synced', render);
render();
</script>
</body>
</html>
